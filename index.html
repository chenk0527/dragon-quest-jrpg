<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>勇者斗恶龙 JRPG</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #e74c3c;
            --accent: #f39c12;
            --success: #27ae60;
            --bg-dark: #1a1a2e;
            --bg-light: #16213e;
            --text: #ecf0f1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            font-family: 'Microsoft YaHei', -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-light) 100%);
            min-height: 100vh;
            color: var(--text);
        }

        .game-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* 像素字体 */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        /* 头部 */
        .header {
            background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 20px;
            font-weight: bold;
        }

        .header-stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* 主内容 */
        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .scene {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .scene.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 主菜单 */
        .main-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 30px;
        }

        .game-title {
            text-align: center;
        }

        .game-title h2 {
            font-size: 36px;
            background: linear-gradient(90deg, var(--accent) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .game-title p {
            color: #95a5a6;
            font-size: 14px;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 280px;
        }

        .btn {
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--secondary) 0%, #c0392b 100%);
            color: white;
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--primary) 0%, #34495e 100%);
            color: white;
        }

        /* 角色卡片 */
        .character-card {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .character-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .character-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, var(--secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .character-info h3 {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .character-class {
            font-size: 13px;
            color: var(--accent);
        }

        .character-level {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 2px;
        }

        /* 血条 */
        .bar-container {
            margin: 8px 0;
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 4px;
            color: #95a5a6;
        }

        .bar {
            height: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 5px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.3s ease;
        }

        .hp-bar { background: linear-gradient(90deg, #e74c3c 0%, #c0392b 100%); }
        .mp-bar { background: linear-gradient(90deg, #3498db 0%, #2980b9 100%); }

        /* 属性列表 */
        .character-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 15px 0;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat span:first-child {
            display: block;
            font-size: 11px;
            color: #95a5a6;
            margin-bottom: 4px;
        }

        .stat span:last-child {
            font-size: 16px;
            font-weight: bold;
            color: var(--accent);
        }

        /* 装备网格 */
        .equipment-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .equipment-slot {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .equipment-slot:hover {
            background: rgba(255,255,255,0.1);
        }

        .equipment-slot.empty {
            color: #7f8c8d;
        }

        .equipment-slot .slot-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .equipment-slot .slot-name {
            font-size: 11px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 品质颜色 */
        .rarity-common { color: #95a5a6; border-color: #95a5a6; }
        .rarity-magic { color: #2ecc71; border-color: #2ecc71; }
        .rarity-rare { color: #3498db; border-color: #3498db; }
        .rarity-epic { color: #9b59b6; border-color: #9b59b6; }
        .rarity-legendary { color: #f39c12; border-color: #f39c12; box-shadow: 0 0 10px rgba(243, 156, 18, 0.3); }

        /* 地图 */
        .map-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        @media (min-width: 768px) {
            .map-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .map-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .map-node {
            aspect-ratio: 1;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .map-node:hover:not(.locked) {
            border-color: var(--accent);
            transform: scale(1.02);
        }

        .map-node.current {
            border-color: var(--secondary);
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.3);
        }

        .map-node.locked {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .map-node.cleared::after {
            content: '✓';
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--success);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .map-node .map-icon {
            font-size: 40px;
            margin-bottom: 8px;
        }

        .map-node .map-name {
            font-size: 13px;
            font-weight: bold;
            text-align: center;
        }

        .map-node .map-level {
            font-size: 11px;
            color: #95a5a6;
            margin-top: 4px;
        }

        /* 战斗界面 */
        .battle-field {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 20px;
            min-height: 400px;
        }

        .battle-enemies {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .enemy-unit {
            text-align: center;
            cursor: pointer;
            padding: 10px;
            border-radius: 12px;
            transition: all 0.2s;
            min-width: 80px;
        }

        .enemy-unit:hover:not(.dead) {
            background: rgba(255,255,255,0.1);
        }

        .enemy-unit.targeted {
            background: rgba(231, 76, 60, 0.3);
            box-shadow: 0 0 15px rgba(231, 76, 60, 0.5);
        }

        .enemy-unit .enemy-icon {
            font-size: 50px;
            margin-bottom: 8px;
        }

        .enemy-unit .enemy-name {
            font-size: 12px;
            margin-bottom: 6px;
        }

        .enemy-unit .enemy-hp-bar {
            width: 70px;
            height: 6px;
            background: rgba(0,0,0,0.5);
            border-radius: 3px;
            overflow: hidden;
            margin: 0 auto 4px;
        }

        .enemy-unit .enemy-hp-text {
            font-size: 10px;
            color: #95a5a6;
        }

        /* 队伍 */
        .battle-party {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .party-member {
            text-align: center;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            min-width: 70px;
            border: 2px solid transparent;
        }

        .party-member.active {
            border-color: var(--accent);
            background: rgba(243, 156, 18, 0.2);
            box-shadow: 0 0 15px rgba(243, 156, 18, 0.3);
        }

        .party-member.dead {
            opacity: 0.4;
            filter: grayscale(100%);
        }

        .party-member .member-icon {
            font-size: 36px;
            margin-bottom: 6px;
        }

        .party-member .member-name {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .party-member .member-hp-bar {
            width: 60px;
            height: 5px;
            background: rgba(0,0,0,0.5);
            border-radius: 3px;
            overflow: hidden;
            margin: 0 auto;
        }

        /* 战斗日志 */
        .battle-log {
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 15px;
            height: 120px;
            overflow-y: auto;
            margin: 15px 0;
            font-size: 13px;
            line-height: 1.6;
        }

        .log-entry {
            margin-bottom: 4px;
            padding: 2px 0;
        }

        .log-entry.crit { color: #f39c12; font-weight: bold; }
        .log-entry.damage { color: #e74c3c; }
        .log-entry.heal { color: #2ecc71; }
        .log-entry.buff { color: #3498db; }
        .log-entry.loot { color: #9b59b6; }
        .log-entry.levelup { color: #f1c40f; font-weight: bold; }

        /* 战斗按钮 */
        .battle-menu {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .battle-btn {
            padding: 14px 8px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary) 0%, #34495e 100%);
            color: white;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .battle-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #34495e 0%, var(--primary) 100%);
            transform: translateY(-2px);
        }

        .battle-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 图鉴系统 */
        .bestiary-family {
            margin-bottom: 30px;
        }

        .bestiary-family h3 {
            color: var(--accent);
            font-size: 18px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }

        .bestiary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        @media (min-width: 768px) {
            .bestiary-grid {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        .bestiary-entry {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .bestiary-entry:hover.unlocked {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .bestiary-entry.locked {
            opacity: 0.5;
            cursor: default;
        }

        .bestiary-entry .entry-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .bestiary-entry .entry-name {
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bestiary-entry .entry-count {
            font-size: 10px;
            color: #95a5a6;
            margin-top: 4px;
        }

        /* 外观系统 */
        .cosmetic-section {
            margin-bottom: 30px;
        }

        .cosmetic-section h3 {
            color: var(--accent);
            font-size: 16px;
            margin-bottom: 15px;
        }

        .cosmetic-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        @media (min-width: 768px) {
            .cosmetic-grid {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        .cosmetic-item {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            position: relative;
        }

        .cosmetic-item:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .cosmetic-item.equipped {
            border-color: var(--success);
            background: rgba(39, 174, 96, 0.2);
        }

        .cosmetic-item .cosmetic-icon {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .cosmetic-item .cosmetic-name {
            font-size: 11px;
            font-weight: bold;
        }

        .cosmetic-item .equipped-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--success);
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 底部导航 */
        .nav-bar {
            display: none;
            justify-content: space-around;
            padding: 12px;
            background: rgba(0,0,0,0.8);
            border-top: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .nav-btn {
            background: none;
            border: none;
            color: #7f8c8d;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s;
            padding: 8px 16px;
            border-radius: 8px;
        }

        .nav-btn.active {
            color: var(--accent);
            background: rgba(243, 156, 18, 0.2);
        }

        .nav-btn:hover {
            color: white;
        }

        .nav-icon {
            font-size: 22px;
        }

        /* Toast提示 */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            animation: toastIn 0.3s ease;
        }

        .toast-success { border-left: 4px solid var(--success); }
        .toast-error { border-left: 4px solid var(--secondary); }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.3);
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .header h1 { font-size: 16px; }
            .header-stats { font-size: 12px; gap: 12px; }
            .game-title h2 { font-size: 28px; }
            .character-stats { grid-template-columns: repeat(2, 1fr); }
            .battle-menu { gap: 8px; }
            .battle-btn { padding: 12px 4px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <header class="header">
            <h1>⚔️ DQ JRPG</h1>
            <div class="header-stats">
                <div class="stat-item"><span>💰</span><span id="headerGold">0</span></div>
            </div>
        </header>

        <main class="main-content">
            <!-- 主菜单 -->
            <div class="scene active" id="sceneMenu">
                <div class="main-menu">
                    <div class="game-title">
                        <h2>勇者斗恶龙</h2>
                        <p>Dragon Quest JRPG v2.0</p>
                    </div>
                    <div class="menu-buttons">
                        <button class="btn btn-primary" onclick="startNewGame()">🎮 开始新游戏</button>
                        <button class="btn btn-secondary" onclick="continueGame()" id="continueBtn" style="display:none;">📂 继续游戏</button>
                    </div>
                </div>
            </div>

            <!-- 队伍界面 -->
            <div class="scene" id="sceneParty">
                <div id="partyContainer"></div>
            </div>

            <!-- 地图界面 -->
            <div class="scene" id="sceneMap">
                <div class="map-grid" id="mapContainer"></div>
            </div>

            <!-- 怪物图鉴 -->
            <div class="scene" id="sceneBestiary">
                <h2 style="text-align:center;margin-bottom:20px;">📖 怪物图鉴</h2>
                <div id="bestiaryContainer"></div>
            </div>

            <!-- 外观时装 -->
            <div class="scene" id="sceneCosmetics">
                <h2 style="text-align:center;margin-bottom:20px;">👗 外观时装</h2>
                <div id="cosmeticsContainer"></div>
            </div>

            <!-- 战斗界面 -->
            <div class="scene" id="sceneBattle">
                <div class="battle-field">
                    <div class="battle-enemies" id="battleEnemies"></div>
                    <div class="battle-party" id="battleParty"></div>
                    <div class="battle-log" id="battleLog"></div>
                    
                    <div class="battle-menu">
                        <button class="battle-btn" onclick="battleAction('attack')">⚔️攻击</button>
                        <button class="battle-btn" onclick="battleAction('skill')">🔥技能</button>
                        <button class="battle-btn" onclick="battleAction('item')">💊物品</button>
                        <button class="battle-btn" onclick="battleAction('defend')">🛡️防御</button>
                    </div>
                </div>
            </div>
        </main>

        <nav class="nav-bar" id="navBar">
            <button class="nav-btn" onclick="showScene('menu')">
                <span class="nav-icon">🏠</span>
                <span>菜单</span>
            </button>
            <button class="nav-btn" onclick="showScene('party')">
                <span class="nav-icon">👥</span>
                <span>队伍</span>
            </button>
            <button class="nav-btn" onclick="showScene('map')">
                <span class="nav-icon">🗺️</span>
                <span>冒险</span>
            </button>
            <button class="nav-btn" onclick="showScene('bestiary')">
                <span class="nav-icon">📖</span>
                <span>图鉴</span>
            </button>
            <button class="nav-btn" onclick="showScene('cosmetics')">
                <span class="nav-icon">👗</span>
                <span>外观</span>
            </button>
        </nav>
    </div>

    <script src="game.js"></script>
</body>
</html>
