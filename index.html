<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- 像素字体: Press Start 2P -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <script>
        if (!window.location.search.includes('nocache')) {
            window.location.href = window.location.href.split('?')[0] + '?nocache=' + Date.now();
        }
    </script>
    <title>勇者斗恶龙 JRPG</title>
    <style>
        /* ============== 基础变量 ============== */
        :root {
            --dq-bg: #1a1a2e;
            --dq-bg-dark: #0f0f1a;
            --dq-blue: #4a90e2;
            --dq-blue-dark: #2c5aa0;
            --dq-blue-light: #87ceeb;
            --dq-gold: #ffd700;
            --dq-gold-dark: #b8860b;
            --dq-red: #ff4444;
            --dq-green: #00cc44;
            --dq-white: #f0f0f0;
            --dq-gray: #808080;
            --pixel-size: 4px;
        }

        /* ============== 基础重置 ============== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        body {
            font-family: 'Press Start 2P', monospace;
            background: var(--dq-bg);
            min-height: 100vh;
            color: var(--dq-white);
            font-size: 10px;
            line-height: 1.5;
        }

        /* ============== CRT扫描线效果 ============== */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%,
                rgba(0, 0, 0, 0.1) 50%
            );
            background-size: 100% 4px;
            opacity: 0.6;
        }

        .crt-flicker {
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.97; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        /* ============== 游戏容器 ============== */
        .game-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--dq-bg);
            position: relative;
            overflow: hidden;
        }

        /* ============== 头部 ============== */
        .header {
            background: linear-gradient(180deg, var(--dq-blue-dark) 0%, var(--dq-blue) 100%);
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--dq-gold-dark);
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 12px;
            color: var(--dq-gold);
            text-shadow: 2px 2px 0 #000;
        }

        .header-stats {
            display: flex;
            gap: 15px;
            font-size: 10px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--dq-white);
        }

        /* ============== 主内容区域 ============== */
        .main-content {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            position: relative;
        }

        .scene {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .scene.active {
            display: block;
        }

        /* 世界探索场景需要flex布局 */
        #worldScene.scene.active {
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ============== 像素风格按钮 ============== */
        .btn {
            padding: 12px 16px;
            border: none;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.1s;
            position: relative;
            background: var(--dq-blue);
            color: white;
            box-shadow: 
                inset -4px -4px 0 var(--dq-blue-dark),
                inset 4px 4px 0 var(--dq-blue-light),
                4px 4px 0 rgba(0,0,0,0.3);
            image-rendering: pixelated;
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 
                inset -2px -2px 0 var(--dq-blue-dark),
                inset 2px 2px 0 var(--dq-blue-light),
                2px 2px 0 rgba(0,0,0,0.3);
        }

        .btn-primary {
            background: var(--dq-red);
            box-shadow: 
                inset -4px -4px 0 #aa0000,
                inset 4px 4px 0 #ff6666,
                4px 4px 0 rgba(0,0,0,0.3);
        }

        .btn-primary:active {
            box-shadow: 
                inset -2px -2px 0 #aa0000,
                inset 2px 2px 0 #ff6666,
                2px 2px 0 rgba(0,0,0,0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ============== 蓝色边框面板 ============== */
        .panel {
            background: var(--dq-bg-dark);
            border: 4px solid var(--dq-blue);
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 
                inset 0 0 0 2px var(--dq-bg),
                4px 4px 0 rgba(0,0,0,0.5);
            position: relative;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            border: 2px solid var(--dq-blue-dark);
            pointer-events: none;
        }

        .panel-title {
            color: var(--dq-gold);
            font-size: 10px;
            margin-bottom: 12px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ============== 主菜单 ============== */
        .main-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 25px;
        }

        .game-title {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-title h2 {
            font-size: 16px;
            color: var(--dq-gold);
            text-shadow: 
                2px 2px 0 #000,
                -2px -2px 0 var(--dq-red);
            margin-bottom: 15px;
            animation: titleGlow 2s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% { text-shadow: 2px 2px 0 #000, -2px -2px 0 var(--dq-red); }
            50% { text-shadow: 3px 3px 0 #000, -3px -3px 0 var(--dq-red), 0 0 20px var(--dq-gold); }
        }

        .game-title p {
            color: var(--dq-gray);
            font-size: 8px;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 260px;
        }

        .menu-buttons .btn {
            padding: 16px 20px;
            font-size: 10px;
        }

        /* ============== 角色卡片 ============== */
        .character-card {
            background: var(--dq-bg-dark);
            border: 4px solid var(--dq-blue);
            padding: 12px;
            margin-bottom: 12px;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
        }

        .character-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .character-avatar {
            width: 48px;
            height: 48px;
            background: var(--dq-blue-dark);
            border: 2px solid var(--dq-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            image-rendering: pixelated;
        }

        .character-avatar img,
        .character-avatar svg {
            width: 40px;
            height: 40px;
            image-rendering: pixelated;
        }

        .character-info h3 {
            font-size: 10px;
            color: var(--dq-white);
            margin-bottom: 4px;
        }

        .character-class {
            font-size: 8px;
            color: var(--dq-gold);
        }

        .character-level {
            font-size: 8px;
            color: var(--dq-gray);
        }

        /* ============== 像素风格血条/MP条 ============== */
        .bar-container {
            margin: 8px 0;
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            margin-bottom: 4px;
            color: var(--dq-gray);
        }

        .bar {
            height: 12px;
            background: var(--dq-bg);
            border: 2px solid var(--dq-white);
            position: relative;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            transition: width 0.3s ease;
            position: relative;
        }

        .bar-fill::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, transparent 50%);
        }

        .hp-bar { background: linear-gradient(180deg, #ff6666 0%, #cc0000 100%); }
        .mp-bar { background: linear-gradient(180deg, #6666ff 0%, #0000cc 100%); }

        /* ============== 属性列表 ============== */
        .character-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 12px 0;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border: 2px solid var(--dq-blue-dark);
        }

        .stat {
            text-align: center;
        }

        .stat span:first-child {
            display: block;
            font-size: 7px;
            color: var(--dq-gray);
            margin-bottom: 4px;
        }

        .stat span:last-child {
            font-size: 10px;
            color: var(--dq-gold);
        }

        /* ============== 装备网格 ============== */
        .equipment-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .equipment-slot {
            background: rgba(0,0,0,0.3);
            border: 2px solid var(--dq-gray);
            padding: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .equipment-slot:hover {
            border-color: var(--dq-blue);
            background: rgba(74,144,226,0.2);
        }

        .equipment-slot.empty {
            color: var(--dq-gray);
            opacity: 0.6;
        }

        .equipment-slot .slot-icon {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .equipment-slot .slot-name {
            font-size: 7px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ============== 品质颜色 ============== */
        .rarity-common { color: #aaaaaa; border-color: #aaaaaa; }
        .rarity-magic { color: #00ff00; border-color: #00ff00; }
        .rarity-rare { color: #0088ff; border-color: #0088ff; }
        .rarity-epic { color: #aa00ff; border-color: #aa00ff; }
        .rarity-legendary { color: #ffaa00; border-color: #ffaa00; box-shadow: 0 0 10px rgba(255,170,0,0.3); }

        /* ============== 地图 ============== */
        .map-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .map-node {
            aspect-ratio: 1;
            background: var(--dq-bg-dark);
            border: 3px solid var(--dq-gray);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            padding: 8px;
        }

        .map-node:hover:not(.locked) {
            border-color: var(--dq-blue);
            box-shadow: 0 0 10px rgba(74,144,226,0.5);
        }

        .map-node.current {
            border-color: var(--dq-gold);
            box-shadow: 0 0 15px rgba(255,215,0,0.5);
            animation: currentMapPulse 2s infinite;
        }

        @keyframes currentMapPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(255,215,0,0.5); }
            50% { box-shadow: 0 0 20px rgba(255,215,0,0.8); }
        }

        .map-node.locked {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .map-node.cleared::after {
            content: '✓';
            position: absolute;
            top: 4px;
            right: 4px;
            color: var(--dq-green);
            font-size: 12px;
            text-shadow: 1px 1px 0 #000;
        }

        .map-node .map-icon {
            font-size: 24px;
            margin-bottom: 6px;
            image-rendering: pixelated;
        }

        .map-node .map-name {
            font-size: 8px;
            text-align: center;
        }

        .map-node .map-level {
            font-size: 7px;
            color: var(--dq-gray);
            margin-top: 4px;
        }

        /* ============== 战斗界面 - DQ风格 ============== */
        .battle-field {
            background: var(--dq-bg-dark);
            border: 4px solid var(--dq-blue);
            padding: 10px;
            min-height: 400px;
            position: relative;
            overflow: hidden;
        }

        /* 战斗布局: 勇者队伍在左(背面), 敌人在右(正面) */
        .battle-arena {
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 180px;
            padding: 15px 10px;
            background: linear-gradient(180deg, #0a0a15 0%, #1a1a2e 50%, #0a0a15 100%);
            border: 2px solid var(--dq-blue-dark);
            margin-bottom: 10px;
            position: relative;
        }

        /* 战场背景效果 */
        .battle-arena::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 30% 50%, rgba(74,144,226,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 50%, rgba(255,68,68,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        /* 勇者队伍 - 左侧 (背面朝向敌人) */
        .battle-party {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            z-index: 1;
        }

        .party-member {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            background: rgba(0,0,0,0.5);
            border: 2px solid var(--dq-gray);
            border-radius: 0;
            transition: all 0.2s;
            cursor: pointer;
        }

        .party-member.active {
            border-color: var(--dq-gold);
            background: rgba(255,215,0,0.2);
            box-shadow: 0 0 10px rgba(255,215,0,0.3);
        }

        .party-member.dead {
            opacity: 0.4;
            filter: grayscale(100%);
        }

        /* 角色背面精灵 */
        .member-sprite {
            width: 32px;
            height: 32px;
            image-rendering: pixelated;
            flex-shrink: 0;
        }

        .member-sprite svg,
        .member-sprite img {
            width: 100%;
            height: 100%;
        }

        .member-info {
            flex: 1;
            min-width: 0;
        }

        .member-name {
            font-size: 8px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .member-hp-bar {
            height: 6px;
            background: var(--dq-bg);
            border: 1px solid var(--dq-white);
            overflow: hidden;
        }

        .member-hp-bar .hp-fill {
            height: 100%;
            background: linear-gradient(180deg, #66ff66 0%, #00cc00 100%);
            transition: width 0.3s;
        }

        .member-mp {
            font-size: 7px;
            color: var(--dq-blue-light);
            margin-top: 2px;
        }

        /* 敌人 - 右侧 (正面朝向玩家) */
        .battle-enemies {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
            align-items: flex-end;
            z-index: 1;
        }

        .enemy-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 8px;
            background: rgba(0,0,0,0.4);
            border: 2px solid transparent;
            transition: all 0.2s;
            min-width: 60px;
        }

        .enemy-unit:hover:not(.dead) {
            background: rgba(255,68,68,0.2);
        }

        .enemy-unit.targeted {
            border-color: var(--dq-red);
            background: rgba(255,68,68,0.3);
            animation: enemyTarget 1s infinite;
        }

        @keyframes enemyTarget {
            0%, 100% { box-shadow: 0 0 5px rgba(255,68,68,0.5); }
            50% { box-shadow: 0 0 15px rgba(255,68,68,0.8); }
        }

        .enemy-unit.dead {
            opacity: 0.3;
            filter: grayscale(100%);
        }

        /* 敌人正面精灵 */
        .enemy-sprite {
            width: 48px;
            height: 48px;
            margin-bottom: 4px;
            image-rendering: pixelated;
        }

        .enemy-sprite svg,
        .enemy-sprite img {
            width: 100%;
            height: 100%;
        }

        .enemy-name {
            font-size: 7px;
            text-align: center;
            margin-bottom: 3px;
            max-width: 60px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .enemy-hp-bar {
            width: 50px;
            height: 5px;
            background: var(--dq-bg);
            border: 1px solid var(--dq-gray);
            overflow: hidden;
        }

        .enemy-hp-bar .hp-fill {
            height: 100%;
            background: linear-gradient(180deg, #ff6666 0%, #cc0000 100%);
            transition: width 0.3s;
        }

        .enemy-hp-text {
            font-size: 6px;
            color: var(--dq-gray);
            margin-top: 2px;
        }

        /* ============== 战斗日志 ============== */
        .battle-log {
            background: var(--dq-bg);
            border: 2px solid var(--dq-gray);
            padding: 8px;
            height: 90px;
            overflow-y: auto;
            margin-bottom: 10px;
            font-size: 8px;
            line-height: 1.8;
        }

        .battle-log::-webkit-scrollbar {
            width: 6px;
        }

        .battle-log::-webkit-scrollbar-track {
            background: var(--dq-bg-dark);
        }

        .battle-log::-webkit-scrollbar-thumb {
            background: var(--dq-blue);
        }

        /* ============== 经典命令菜单 ============== */
        .battle-menu {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .battle-btn {
            padding: 12px 4px;
            font-size: 8px;
            background: var(--dq-bg);
            border: 2px solid var(--dq-white);
            color: var(--dq-white);
            font-family: 'Press Start 2P', monospace;
            cursor: pointer;
            transition: all 0.1s;
            position: relative;
        }

        .battle-btn::before {
            content: '▶';
            position: absolute;
            left: 4px;
            opacity: 0;
            transition: opacity 0.1s;
        }

        .battle-btn:hover::before {
            opacity: 1;
        }

        .battle-btn:hover {
            background: var(--dq-blue);
            border-color: var(--dq-blue-light);
            padding-left: 12px;
        }

        .battle-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ============== 图鉴系统 ============== */
        .bestiary-family {
            margin-bottom: 20px;
        }

        .bestiary-family h3 {
            color: var(--dq-gold);
            font-size: 10px;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--dq-blue-dark);
        }

        .bestiary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .bestiary-entry {
            background: var(--dq-bg-dark);
            border: 2px solid var(--dq-gray);
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .bestiary-entry:hover.unlocked {
            border-color: var(--dq-blue);
            background: rgba(74,144,226,0.2);
        }

        .bestiary-entry.locked {
            opacity: 0.3;
            cursor: default;
        }

        .bestiary-entry .entry-icon {
            font-size: 20px;
            margin-bottom: 4px;
            image-rendering: pixelated;
        }

        .bestiary-entry .entry-name {
            font-size: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bestiary-entry .entry-count {
            font-size: 6px;
            color: var(--dq-gray);
            margin-top: 2px;
        }

        /* ============== 外观系统 ============== */
        .cosmetic-section {
            margin-bottom: 20px;
        }

        .cosmetic-section h3 {
            color: var(--dq-gold);
            font-size: 10px;
            margin-bottom: 10px;
        }

        .cosmetic-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .cosmetic-item {
            background: var(--dq-bg-dark);
            border: 2px solid var(--dq-gray);
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .cosmetic-item:hover {
            border-color: var(--dq-blue);
        }

        .cosmetic-item.equipped {
            border-color: var(--dq-green);
            background: rgba(0,204,68,0.2);
        }

        .cosmetic-item .cosmetic-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .cosmetic-item .cosmetic-name {
            font-size: 6px;
        }

        .cosmetic-item .equipped-badge {
            position: absolute;
            top: 2px;
            right: 2px;
            color: var(--dq-green);
            font-size: 8px;
        }

        /* ============== 底部导航 ============== */
        .nav-bar {
            display: flex;
            justify-content: space-around;
            padding: 8px 4px;
            background: var(--dq-bg-dark);
            border-top: 4px solid var(--dq-blue);
            position: sticky;
            bottom: 0;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--dq-gray);
            font-size: 7px;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s;
            padding: 6px 8px;
        }

        .nav-btn.active {
            color: var(--dq-gold);
        }

        .nav-btn:hover {
            color: var(--dq-white);
        }

        .nav-icon {
            font-size: 16px;
        }

        /* ============== 动画效果 ============== */
        
        /* 闪烁效果 */
        @keyframes flash {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(3) saturate(0); }
        }

        .flash-effect {
            animation: flash 0.15s ease 3;
        }

        /* 屏幕震动 */
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-4px, -4px); }
            20% { transform: translate(4px, 4px); }
            30% { transform: translate(-4px, 4px); }
            40% { transform: translate(4px, -4px); }
            50% { transform: translate(-4px, -4px); }
            60% { transform: translate(4px, 4px); }
            70% { transform: translate(-4px, 4px); }
            80% { transform: translate(4px, -4px); }
            90% { transform: translate(-4px, -4px); }
        }

        .shake-effect {
            animation: shake 0.4s ease;
        }

        /* 攻击闪光 */
        @keyframes attackFlash {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(1.5); }
        }

        .attack-flash {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #fff 0%, transparent 70%);
            pointer-events: none;
            animation: attackFlash 0.3s ease forwards;
        }

        /* 魔法光效 */
        @keyframes magicGlow {
            0% { box-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff; }
            50% { box-shadow: 0 0 20px #00ffff, 0 0 30px #0088ff, 0 0 40px #0000ff; }
            100% { box-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff; }
        }

        .magic-effect {
            animation: magicGlow 0.8s ease infinite;
        }

        /* 受伤红色闪烁 */
        @keyframes damageRed {
            0%, 100% { background-color: transparent; }
            50% { background-color: rgba(255,0,0,0.5); }
        }

        .damage-effect {
            animation: damageRed 0.2s ease 2;
        }

        /* 升级金光 */
        @keyframes levelUpGold {
            0% { box-shadow: 0 0 0 0 rgba(255,215,0,0.7); }
            50% { box-shadow: 0 0 20px 10px rgba(255,215,0,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,215,0,0); }
        }

        .levelup-effect {
            animation: levelUpGold 1s ease;
        }

        /* ============== Toast提示 ============== */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--dq-bg-dark);
            border: 3px solid var(--dq-white);
            padding: 12px 20px;
            font-size: 9px;
            z-index: 10000;
            animation: toastIn 0.3s ease;
            max-width: 90%;
            text-align: center;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
        }

        .toast-success { border-color: var(--dq-green); color: var(--dq-green); }
        .toast-error { border-color: var(--dq-red); color: var(--dq-red); }
        .toast-info { border-color: var(--dq-blue); color: var(--dq-blue-light); }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ============== 像素精灵图 ============== */
        .sprite {
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        /* ============== 滚动条 ============== */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--dq-bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--dq-blue);
            border: 2px solid var(--dq-bg-dark);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--dq-blue-light);
        }

        /* ============== 响应式 ============== */
        @media (max-width: 480px) {
            body { font-size: 9px; }
            .header h1 { font-size: 10px; }
            .game-title h2 { font-size: 14px; }
            .btn { font-size: 9px; padding: 10px 12px; }
            .battle-btn { font-size: 7px; padding: 10px 2px; }
            .panel { padding: 10px; }
            .character-stats { grid-template-columns: repeat(2, 1fr); }
            .member-sprite { width: 28px; height: 28px; }
            .enemy-sprite { width: 40px; height: 40px; }
        }

        /* ============== 装备强化弹窗 ============== */
        .enhance-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .enhance-overlay.active {
            opacity: 1;
        }

        .enhance-panel {
            background: var(--dq-bg);
            border: 4px solid var(--dq-gold);
            padding: 20px;
            width: 90%;
            max-width: 340px;
            box-shadow: 
                inset 0 0 0 2px var(--dq-bg-dark),
                0 0 20px rgba(255,215,0,0.3);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .enhance-overlay.active .enhance-panel {
            transform: scale(1);
        }

        .enhance-panel h2 {
            text-align: center;
            color: var(--dq-gold);
            margin-bottom: 15px;
            font-size: 12px;
        }

        /* ============== 技能树 ============== */
        .skill-tree-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .skill-tree-overlay.active {
            opacity: 1;
        }

        .skill-tree-panel {
            background: var(--dq-bg);
            border: 4px solid var(--dq-blue);
            padding: 20px;
            width: 90%;
            max-width: 380px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 
                inset 0 0 0 2px var(--dq-bg-dark),
                0 0 20px rgba(74,144,226,0.3);
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .skill-item {
            background: var(--dq-bg-dark);
            border: 2px solid var(--dq-gray);
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .skill-item.learned {
            border-color: var(--dq-green);
            background: rgba(0,204,68,0.15);
        }

        .skill-item.available {
            border-color: var(--dq-gold);
            background: rgba(255,215,0,0.15);
        }

        .skill-item.locked {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .skill-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .skill-name {
            font-size: 8px;
            margin-bottom: 2px;
        }

        .skill-level {
            font-size: 7px;
            color: var(--dq-gold);
        }

        .skill-mp {
            font-size: 6px;
            color: var(--dq-blue-light);
        }

        .skill-desc {
            font-size: 6px;
            color: var(--dq-gray);
            margin-top: 4px;
            line-height: 1.4;
        }

        /* ============== 队伍解锁信息 ============== */
        .party-unlock-info {
            background: var(--dq-bg-dark);
            border: 3px solid var(--dq-gold);
            padding: 12px;
            margin: 15px 0;
            text-align: center;
        }

        .party-unlock-info h3 {
            color: var(--dq-gold);
            margin-bottom: 10px;
            font-size: 10px;
        }

        .unlock-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .unlock-item {
            background: rgba(0,0,0,0.3);
            padding: 8px;
            font-size: 7px;
        }

        .unlock-item.locked {
            opacity: 0.4;
        }

        .unlock-item.unlocked {
            border: 1px solid var(--dq-green);
            background: rgba(0,204,68,0.2);
        }

        /* ============== 装备材料显示 ============== */
        .materials-display {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 2px solid var(--dq-blue-dark);
        }

        .materials-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .material-badge {
            background: var(--dq-bg-dark);
            border: 1px solid var(--dq-gray);
            padding: 3px 8px;
            font-size: 7px;
        }

        /* ============== 剧情对话系统 ================= */
        .story-dialog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 10000;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .story-dialog-overlay.active {
            opacity: 1;
        }

        .story-dialog-panel {
            width: 95%;
            max-width: 460px;
            background: var(--dq-bg-dark);
            border: 4px solid var(--dq-blue);
            border-radius: 4px;
            padding: 15px;
            display: flex;
            align-items: flex-start;
            gap: 15px;
            position: relative;
            box-shadow: 
                inset 0 0 0 2px var(--dq-bg),
                0 0 20px rgba(74,144,226,0.5),
                0 4px 0 rgba(0,0,0,0.5);
            animation: dialogSlideUp 0.3s ease;
        }

        @keyframes dialogSlideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .story-avatar {
            width: 64px;
            height: 64px;
            flex-shrink: 0;
            background: var(--dq-bg);
            border: 3px solid var(--dq-blue-light);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .story-avatar svg {
            width: 100%;
            height: 100%;
        }

        .story-content {
            flex: 1;
            min-width: 0;
        }

        .story-speaker {
            font-size: 12px;
            font-weight: bold;
            color: var(--dq-gold);
            margin-bottom: 8px;
            text-shadow: 1px 1px 0 #000;
        }

        .story-text {
            font-size: 10px;
            line-height: 1.8;
            color: var(--dq-white);
            min-height: 60px;
        }

        .story-controls {
            position: absolute;
            right: 10px;
            top: 10px;
            display: flex;
            gap: 8px;
        }

        .story-btn {
            background: var(--dq-blue-dark);
            border: 2px solid var(--dq-blue);
            color: var(--dq-white);
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 6px 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .story-btn:hover {
            background: var(--dq-blue);
            border-color: var(--dq-blue-light);
        }

        .story-indicator {
            position: absolute;
            bottom: 10px;
            right: 15px;
            color: var(--dq-gold);
            font-size: 16px;
            animation: indicatorBounce 0.8s infinite;
        }

        @keyframes indicatorBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(5px); }
        }

        /* ============== 音量控制 ================= */
        .audio-controls {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 10001;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.7);
            padding: 8px 12px;
            border-radius: 4px;
            border: 2px solid var(--dq-blue);
        }

        .audio-btn {
            background: none;
            border: none;
            color: var(--dq-white);
            font-size: 16px;
            cursor: pointer;
            padding: 4px;
            transition: all 0.2s;
        }

        .audio-btn:hover {
            color: var(--dq-gold);
            transform: scale(1.1);
        }

        .volume-slider {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--dq-blue-dark);
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            background: var(--dq-gold);
            border-radius: 50%;
            cursor: pointer;
        }

        .volume-slider::-moz-range-thumb {
            width: 12px;
            height: 12px;
            background: var(--dq-gold);
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        @media (max-width: 480px) {
            .story-dialog-panel {
                padding: 10px;
                gap: 10px;
            }
            
            .story-avatar {
                width: 48px;
                height: 48px;
            }
            
            .story-speaker {
                font-size: 10px;
            }
            
            .story-text {
                font-size: 9px;
                min-height: 50px;
            }
            
            .story-btn {
                font-size: 7px;
                padding: 4px 8px;
            }

            .audio-controls {
                top: 5px;
                right: 5px;
                padding: 5px 8px;
            }

            .volume-slider {
                width: 50px;
            }
        }

        /* ============== 世界探索场景 - 简化版 ============== */
        #worldScene {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
            background: #1a1a2e;
            display: none;
        }
        
        #worldScene.active {
            display: flex !important;
            flex-direction: column;
        }

        .world-header {
            height: 50px;
            background: linear-gradient(180deg, #2c5aa0 0%, #4a90e2 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 4px solid #b8860b;
        }

        .world-title {
            font-size: 14px;
            color: #ffd700;
            text-shadow: 2px 2px 0 #000;
        }

        .world-content {
            flex: 1;
            position: relative;
            background: #0f0f1a;
        }

        #worldCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: #1a3a1a;
        }

        /* 场景过渡 */
        .transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            opacity: 0;
            pointer-events: none;
            z-index: 9998;
            transition: opacity 0.3s ease;
        }

        .transition-overlay.active {
            opacity: 1;
        }
        /* 进入冒险的动画 */
        @keyframes enterWorldPulse {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .enter-world-message {
            font-family: 'Press Start 2P', monospace;
        }
    </style>
</head>
<body>
    <!-- CRT扫描线覆盖层 -->
    <div class="crt-overlay"></div>
    
    <!-- 音量控制 -->
    <div class="audio-controls">
        <button class="audio-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="50" onchange="setVolume(this.value/100)">
    </div>
    
    <div class="game-container">
        <header class="header">
            <h1>⚔️ DQ JRPG</h1>
            <div class="header-stats">
                <div class="stat-item"><span>💰</span><span id="headerGold">0</span></div>
            </div>
        </header>

        <main class="main-content">
            <!-- 主菜单 -->
            <div class="scene active" id="sceneMenu">
                <div class="main-menu">
                    <div class="game-title">
                        <h2>DRAGON QUEST</h2>
                        <p>勇者斗恶龙 RPG</p>
                    </div>
                    <div class="menu-buttons">
                        <button class="btn btn-primary" onclick="startNewGame()">▶ 开始新游戏</button>
                        <button class="btn btn-secondary" onclick="continueGame()" id="continueBtn" style="display:none;">📂 继续游戏</button>
                    </div>
                </div>
            </div>

            <!-- 队伍界面 -->
            <div class="scene" id="sceneParty">
                <div id="partyContainer"></div>
                <div class="party-unlock-info" id="partyUnlockInfo" style="display:none;">
                    <h3>🎭 角色解锁进度</h3>
                    <div class="unlock-list">
                        <div class="unlock-item" id="unlock-mage">
                            <span>🔮 法师</span><br>
                            <small>击败森林BOSS解锁</small>
                        </div>
                        <div class="unlock-item" id="unlock-archer">
                            <span>🏹 弓箭手</span><br>
                            <small>击败洞穴BOSS解锁</small>
                        </div>
                        <div class="unlock-item" id="unlock-priest">
                            <span>✝️ 牧师</span><br>
                            <small>击败沙漠BOSS解锁</small>
                        </div>
                        <div class="unlock-item" id="unlock-rogue">
                            <span>🗡️ 盗贼</span><br>
                            <small>击败火山BOSS解锁</small>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 地图界面 -->
            <div class="scene" id="sceneMap">
                <div class="panel">
                    <div class="panel-title">选择冒险地点</div>
                    <div class="map-grid" id="mapContainer"></div>
                </div>
            </div>

            <!-- 怪物图鉴 -->
            <div class="scene" id="sceneBestiary">
                <div class="panel">
                    <div class="panel-title">📖 怪物图鉴</div>
                    <div id="bestiaryContainer"></div>
                </div>
            </div>

            <!-- 外观时装 -->
            <div class="scene" id="sceneCosmetics">
                <div class="panel">
                    <div class="panel-title">👗 外观时装</div>
                    <div id="cosmeticsContainer"></div>
                </div>
            </div>

            <!-- 战斗界面 - DQ风格 -->
            <div class="scene" id="sceneBattle">
                <div class="battle-field">
                    <!-- 战斗区域: 勇者在左(背面), 敌人在右(正面) -->
                    <div class="battle-arena" id="battleArena">
                        <div class="battle-party" id="battleParty"></div>
                        <div class="battle-enemies" id="battleEnemies"></div>
                    </div>
                    
                    <!-- 战斗日志 -->
                    <div class="battle-log" id="battleLog"></div>
                    
                    <!-- 经典命令菜单 -->
                    <div class="battle-menu">
                        <button class="battle-btn" onclick="battleAction('attack')">⚔️战斗</button>
                        <button class="battle-btn" onclick="battleAction('skill')">🔥技能</button>
                        <button class="battle-btn" onclick="battleAction('item')">💊物品</button>
                        <button class="battle-btn" onclick="battleAction('flee')">🏃逃跑</button>
                    </div>
                </div>
            </div>
        </main>

        <nav class="nav-bar" id="navBar">
            <button class="nav-btn" onclick="showScene('menu')">
                <span class="nav-icon">🏠</span>
                <span>菜单</span>
            </button>
            <button class="nav-btn" onclick="showScene('party')">
                <span class="nav-icon">👥</span>
                <span>队伍</span>
            </button>
            <button class="nav-btn" onclick="showScene('world')">
                <span class="nav-icon">🗺️</span>
                <span>冒险</span>
            </button>
            <button class="nav-btn" onclick="showScene('bestiary')">
                <span class="nav-icon">📖</span>
                <span>图鉴</span>
            </button>
            <button class="nav-btn" onclick="showScene('cosmetics')">
                <span class="nav-icon">👗</span>
                <span>外观</span>
            </button>
        </nav>

        <!-- 世界探索场景 -->
        <div id="worldScene" class="scene">
            <div class="world-header">
                <button class="back-btn" onclick="showScene('party')">◀ 返回</button>
                <h2 class="world-title">新手村</h2>
                <div style="width: 60px;"></div>
            </div>
            <div class="world-content">
                <canvas id="worldCanvas"></canvas>
            </div>
        </div>
        
        <!-- 场景过渡遮罩 -->
        <div id="transitionOverlay" class="transition-overlay"></div>
    </div>
    
    <script src="audio-system.js"></script>
    <script src="world-explore.js"></script>
    <script src="game-pixel.js"></script>
</body>
</html>
