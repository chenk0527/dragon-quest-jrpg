<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Goblin Pixel Art - 64x64 -->
  <!-- Shadow -->
  <ellipse cx="32" cy="56" rx="16" ry="4" fill="#000000" opacity="0.3"/>
  
  <!-- Legs - Green -->
  <rect x="22" y="44" width="8" height="10" fill="#689f38"/>
  <rect x="34" y="44" width="8" height="10" fill="#689f38"/>
  
  <!-- Body -->
  <rect x="20" y="32" width="24" height="14" fill="#689f38"/>
  <rect x="18" y="34" width="4" height="10" fill="#558b2f"/>
  <rect x="42" y="34" width="4" height="10" fill="#558b2f"/>
  
  <!-- Loincloth -->
  <rect x="26" y="42" width="12" height="6" fill="#5d4037"/>
  
  <!-- Arms -->
  <rect x="10" y="34" width="10" height="6" fill="#689f38"/>
  <rect x="44" y="34" width="10" height="6" fill="#689f38"/>
  
  <!-- Hands -->
  <rect x="8" y="38" width="6" height="6" fill="#689f38"/>
  <rect x="50" y="38" width="6" height="6" fill="#689f38"/>
  
  <!-- Head - Large -->
  <rect x="22" y="12" width="20" height="20" fill="#689f38"/>
  
  <!-- Ears - Large pointed -->
  <rect x="14" y="16" width="8" height="8" fill="#689f38"/>
  <rect x="42" y="16" width="8" height="8" fill="#689f38"/>
  <rect x="12" y="14" width="4" height="6" fill="#689f38"/>
  <rect x="48" y="14" width="4" height="6" fill="#689f38"/>
  
  <!-- Ear details -->
  <rect x="14" y="18" width="2" height="4" fill="#558b2f"/>
  <rect x="48" y="18" width="2" height="4" fill="#558b2f"/>
  
  <!-- Eyes - Yellow mischievous -->
  <rect x="26" y="20" width="4" height="4" fill="#ffeb3b"/>
  <rect x="34" y="20" width="4" height="4" fill="#ffeb3b"/>
  
  <rect x="27" y="21" width="2" height="2" fill="#ff0000"/>
  <rect x="35" y="21" width="2" height="2" fill="#ff0000"/>
  
  <!-- Nose -->
  <rect x="30" y="26" width="4" height="3" fill="#558b2f"/>
  
  <!-- Mouth - Grinning -->
  <rect x="28" y="30" width="8" height="2" fill="#3e2723"/>
  <rect x="27" y="29" width="2" height="2" fill="#ffffff"/>
  <rect x="35" y="29" width="2" height="2" fill="#ffffff"/>
  
  <!-- Club (Right Hand) -->
  <rect x="52" y="24" width="6" height="20" fill="#5d4037"/>
  <rect x="50" y="22" width="10" height="4" fill="#5d4037"/>
  
  <!-- Club spikes -->
  <rect x="50" y="20" width="2" height="2" fill="#757575"/>
  <rect x="60" y="20" width="2" height="2" fill="#757575"/>
  <rect x="48" y="24" width="2" height="2" fill="#757575"/>
</svg>