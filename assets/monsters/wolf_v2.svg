<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Wolf Pixel Art - 64x64 -->
  <!-- Shadow -->
  <ellipse cx="32" cy="56" rx="18" ry="5" fill="#000000" opacity="0.3"/>
  
  <!-- Back legs -->
  <rect x="16" y="40" width="8" height="14" fill="#4a4a4a"/>
  <rect x="40" y="40" width="8" height="14" fill="#4a4a4a"/>
  
  <!-- Back leg paws -->
  <rect x="14" y="52" width="10" height="4" fill="#2d2d2d"/>
  <rect x="40" y="52" width="10" height="4" fill="#2d2d2d"/>
  
  <!-- Body -->
  <rect x="16" y="28" width="32" height="18" fill="#6b6b6b"/>
  <rect x="20" y="32" width="24" height="10" fill="#7a7a7a"/>
  
  <!-- Chest fur -->
  <rect x="24" y="34" width="16" height="8" fill="#9e9e9e"/>
  
  <!-- Front legs -->
  <rect x="22" y="42" width="6" height="12" fill="#5a5a5a"/>
  <rect x="36" y="42" width="6" height="12" fill="#5a5a5a"/>
  
  <!-- Front paws -->
  <rect x="20" y="52" width="8" height="4" fill="#3d3d3d"/>
  <rect x="36" y="52" width="8" height="4" fill="#3d3d3d"/>
  
  <!-- Neck -->
  <rect x="36" y="20" width="12" height="12" fill="#6b6b6b"/>
  
  <!-- Head -->
  <rect x="38" y="12" width="16" height="12" fill="#7a7a7a"/>
  
  <!-- Snout -->
  <rect x="52" y="18" width="8" height="6" fill="#5a5a5a"/>
  
  <!-- Nose -->
  <rect x="58" y="18" width="2" height="2" fill="#000000"/>
  
  <!-- Ear -->
  <rect x="40" y="8" width="4" height="6" fill="#4a4a4a"/>
  <rect x="48" y="8" width="4" height="6" fill="#4a4a4a"/>
  
  <!-- Ear inner -->
  <rect x="41" y="9" width="2" height="3" fill="#8a8a8a"/>
  <rect x="49" y="9" width="2" height="3" fill="#8a8a8a"/>
  
  <!-- Eye - Yellow fierce -->
  <rect x="50" y="14" width="4" height="3" fill="#ffeb3b"/>
  <rect x="51" y="15" width="2" height="1" fill="#ff0000"/>
  
  <!-- Tail -->
  <rect x="8" y="32" width="10" height="6" fill="#6b6b6b"/>
  <rect x="4" y="30" width="6" height="4" fill="#6b6b6b"/>
  
  <!-- Tail tip -->
  <rect x="2" y="28" width="4" height="4" fill="#9e9e9e"/>
</svg>