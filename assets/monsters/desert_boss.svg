<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Desert Boss - Pharaoh -->
  <!-- Lower body/dress -->
  <rect x="12" y="32" width="24" height="16" fill="#FFD700"/>
  <rect x="14" y="34" width="20" height="12" fill="#FFC107"/>
  <rect x="16" y="36" width="16" height="8" fill="#FFB300"/>
  
  <!-- Decorative stripes on dress -->
  <rect x="14" y="38" width="20" height="2" fill="#2196F3"/>
  <rect x="16" y="42" width="16" height="2" fill="#2196F3"/>
  
  <!-- Torso -->
  <rect x="14" y="20" width="20" height="14" fill="#FFC107"/>
  <rect x="16" y="22" width="16" height="10" fill="#FFD54F"/>
  
  <!-- Chest piece -->
  <rect x="18" y="24" width="12" height="6" fill="#2196F3"/>
  <rect x="20" y="26" width="8" height="2" fill="#1976D2"/>
  
  <!-- Arms -->
  <rect x="6" y="22" width="8" height="12" fill="#D2B48C"/>
  <rect x="34" y="22" width="8" height="12" fill="#D2B48C"/>
  <rect x="4" y="24" width="4" height="8" fill="#C19A6B"/>
  <rect x="40" y="24" width="4" height="8" fill="#C19A6B"/>
  
  <!-- Golden armbands -->
  <rect x="6" y="26" width="8" height="3" fill="#FFD700"/>
  <rect x="34" y="26" width="8" height="3" fill="#FFD700"/>
  
  <!-- Hands holding staff -->
  <rect x="2" y="30" width="6" height="6" fill="#D2B48C"/>
  
  <!-- Staff -->
  <rect x="0" y="8" width="4" height="40" fill="#8D6E63"/>
  <rect x="-2" y="6" width="8" height="4" fill="#FFD700"/>
  <rect x="-4" y="2" width="4" height="6" fill="#2196F3"/>
  <rect x="4" y="2" width="4" height="6" fill="#2196F3"/>
  <rect x="-2" y="0" width="8" height="4" fill="#FFD700"/>
  
  <!-- Head -->
  <rect x="16" y="10" width="16" height="12" fill="#D2B48C"/>
  <rect x="18" y="12" width="12" height="8" fill="#E6C9A8"/>
  
  <!-- Nemes headdress -->
  <rect x="12" y="4" width="24" height="8" fill="#2196F3"/>
  <rect x="10" y="6" width="4" height="6" fill="#1976D2"/>
  <rect x="34" y="6" width="4" height="6" fill="#1976D2"/>
  <rect x="14" y="2" width="20" height="4" fill="#1976D2"/>
  <rect x="16" y="0" width="16" height="4" fill="#FFD700"/>
  <rect x="20" y="1" width="8" height="2" fill="#FFA000"/>
  
  <!-- Stripes on headdress -->
  <rect x="14" y="4" width="2" height="8" fill="#FFD700"/>
  <rect x="18" y="4" width="2" height="8" fill="#FFD700"/>
  <rect x="22" y="4" width="2" height="8" fill="#FFD700"/>
  <rect x="26" y="4" width="2" height="8" fill="#FFD700"/>
  <rect x="30" y="4" width="2" height="8" fill="#FFD700"/>
  
  <!-- Eyes -->
  <rect x="18" y="14" width="4" height="4" fill="#FFF"/>
  <rect x="26" y="14" width="4" height="4" fill="#FFF"/>
  <rect x="19" y="15" width="2" height="2" fill="#000"/>
  <rect x="27" y="15" width="2" height="2" fill="#000"/>
  
  <!-- Eye of Horus makeup -->
  <rect x="17" y="13" width="6" height="1" fill="#000"/>
  <rect x="25" y="13" width="6" height="1" fill="#000"/>
  
  <!-- Beard -->
  <rect x="20" y="20" width="8" height="6" fill="#212121"/>
  <rect x="22" y="22" width="4" height="4" fill="#424242"/>
  <rect x="23" y="26" width="2" height="4" fill="#212121"/>
  
  <!-- Necklace -->
  <rect x="16" y="20" width="16" height="3" fill="#FFD700"/>
  <rect x="22" y="20" width="4" height="3" fill="#2196F3"/>
</svg>