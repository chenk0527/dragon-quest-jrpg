<!-- Goblin Monster - Pixel Art Style SVG -->
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" fill="#1a1a2e"/>
  
  <!-- Body -->
  <rect x="24" y="32" width="16" height="16" fill="#27ae60"/>
  
  <!-- Head -->
  <rect x="24" y="16" width="16" height="16" fill="#58d68d"/>
  
  <!-- Ears -->
  <rect x="18" y="20" width="6" height="8" fill="#58d68d"/>
  <rect x="40" y="20" width="6" height="8" fill="#58d68d"/>
  
  <!-- Eyes -->
  <rect x="26" y="22" width="4" height="4" fill="#c0392b"/>
  <rect x="34" y="22" width="4" height="4" fill="#c0392b"/>
  
  <!-- Mouth -->
  <rect x="28" y="28" width="8" height="2" fill="#000"/>
  
  <!-- Weapon -->
  <rect x="42" y="28" width="4" height="20" fill="#7f8c8d"/>
</svg>
