<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Final Boss - Chaos Demon King - 64x64 -->
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="24" ry="6" fill="#000000" opacity="0.5"/>
  
  <!-- Wings - Dark purple -->
  <rect x="4" y="20" width="20" height="24" fill="#4a148c"/>
  <rect x="40" y="20" width="20" height="24" fill="#4a148c"/>
  
  <!-- Wing membranes -->
  <rect x="6" y="24" width="14" height="16" fill="#7b1fa2" opacity="0.6"/>
  <rect x="44" y="24" width="14" height="16" fill="#7b1fa2" opacity="0.6"/>
  
  <!-- Wing bones -->
  <rect x="8" y="20" width="2" height="20" fill="#000000"/>
  <rect x="54" y="20" width="2" height="20" fill="#000000"/>
  
  <!-- Wing tips -->
  <rect x="0" y="28" width="4" height="8" fill="#000000"/>
  <rect x="60" y="28" width="4" height="8" fill="#000000"/>
  
  <!-- Body - Muscular red -->
  <rect x="22" y="28" width="20" height="22" fill="#b71c1c"/>
  <rect x="20" y="32" width="4" height="14" fill="#8b0000"/>
  <rect x="40" y="32" width="4" height="14" fill="#8b0000"/>
  
  <!-- Chest muscles -->
  <rect x="26" y="32" width="5" height="8" fill="#d32f2f"/>
  <rect x="33" y="32" width="5" height="8" fill="#d32f2f"/>
  
  <!-- Abs -->
  <rect x="28" y="42" width="3" height="4" fill="#d32f2f"/>
  <rect x="33" y="42" width="3" height="4" fill="#d32f2f"/>
  
  <!-- Legs -->
  <rect x="24" y="48" width="7" height="10" fill="#8b0000"/>
  <rect x="33" y="48" width="7" height="10" fill="#8b0000"/>
  
  <!-- Hooves -->
  <rect x="22" y="54" width="10" height="4" fill="#000000"/>
  <rect x="32" y="54" width="10" height="4" fill="#000000"/>
  
  <!-- Arms - Large muscular -->
  <rect x="12" y="32" width="10" height="12" fill="#b71c1c"/>
  <rect x="42" y="32" width="10" height="12" fill="#b71c1c"/>
  
  <!-- Hands - Claws -->
  <rect x="8" y="38" width="8" height="8" fill="#000000"/>
  <rect x="48" y="38" width="8" height="8" fill="#000000"/>
  
  <!-- Head -->
  <rect x="24" y="12" width="16" height="16" fill="#b71c1c"/>
  
  <!-- Horns - Large curved -->
  <rect x="16" y="8" width="8" height="8" fill="#ffd700"/>
  <rect x="40" y="8" width="8" height="8" fill="#ffd700"/>
  
  <rect x="12" y="4" width="6" height="6" fill="#ffd700"/>
  <rect x="46" y="4" width="6" height="6" fill="#ffd700"/>
  
  <rect x="8" y="0" width="4" height="4" fill="#ffd700"/>
  <rect x="52" y="0" width="4" height="4" fill="#ffd700"/>
  
  <!-- Crown -->
  <rect x="22" y="8" width="20" height="4" fill="#000000"/>
  <rect x="30" y="6" width="4" height="4" fill="#ffd700"/>
  
  <!-- Eyes - Burning red -->
  <rect x="26" y="18" width="4" height="4" fill="#ff0000"/>
  <rect x="34" y="18" width="4" height="4" fill="#ff0000"/>
  
  <rect x="27" y="19" width="2" height="2" fill="#ffeb3b"/>
  <rect x="35" y="19" width="2" height="2" fill="#ffeb3b"/>
  
  <!-- Eye glow -->
  <rect x="25" y="17" width="6" height="6" fill="#ff0000" opacity="0.3"/>
  <rect x="33" y="17" width="6" height="6" fill="#ff0000" opacity="0.3"/>
  
  <!-- Nose -->
  <rect x="30" y="22" width="4" height="3" fill="#8b0000"/>
  
  <!-- Mouth - Fangs -->
  <rect x="28" y="26" width="8" height="2" fill="#000000"/>
  
  <rect x="27" y="24" width="2" height="4" fill="#ffffff"/>
  <rect x="35" y="24" width="2" height="4" fill="#ffffff"/>
  
  <!-- Aura/Dark energy -->
  <rect x="20" y="10" width="2" height="2" fill="#9c27b0" opacity="0.6"/>
  <rect x="42" y="10" width="2" height="2" fill="#9c27b0" opacity="0.6"/>
  <rect x="18" y="36" width="2" height="2" fill="#9c27b0" opacity="0.6"/>
  <rect x="44" y="36" width="2" height="2" fill="#9c27b0" opacity="0.6"/>
