<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Skeleton Pixel Art - 64x64 -->
  <!-- Shadow -->
  <ellipse cx="32" cy="56" rx="12" ry="4" fill="#000000" opacity="0.3"/>
  
  <!-- Legs - Bone -->
  <rect x="22" y="44" width="4" height="12" fill="#e0e0e0"/>
  <rect x="38" y="44" width="4" height="12" fill="#e0e0e0"/>
  
  <!-- Leg joints -->
  <rect x="21" y="46" width="6" height="2" fill="#bdbdbd"/>
  <rect x="37" y="46" width="6" height="2" fill="#bdbdbd"/>
  <rect x="21" y="52" width="6" height="2" fill="#bdbdbd"/>
  <rect x="37" y="52" width="6" height="2" fill="#bdbdbd"/>
  
  <!-- Feet -->
  <rect x="20" y="54" width="8" height="4" fill="#e0e0e0"/>
  <rect x="36" y="54" width="8" height="4" fill="#e0e0e0"/>
  
  <!-- Pelvis -->
  <rect x="26" y="40" width="12" height="6" fill="#e0e0e0"/>
  <rect x="28" y="42" width="8" height="2" fill="#bdbdbd"/>
  
  <!-- Spine -->
  <rect x="30" y="28" width="4" height="14" fill="#e0e0e0"/>
  
  <!-- Spine segments -->
  <rect x="29" y="30" width="6" height="1" fill="#bdbdbd"/>
  <rect x="29" y="34" width="6" height="1" fill="#bdbdbd"/>
  <rect x="29" y="38" width="6" height="1" fill="#bdbdbd"/>
  
  <!-- Ribcage -->
  <rect x="22" y="28" width="20" height="12" fill="#f5f5f5"/>
  <rect x="24" y="30" width="16" height="8" fill="#e0e0e0"/>
  
  <!-- Ribs -->
  <rect x="22" y="30" width="2" height="8" fill="#bdbdbd"/>
  <rect x="40" y="30" width="2" height="8" fill="#bdbdbd"/>
  <rect x="26" y="28" width="2" height="4" fill="#bdbdbd"/>
  <rect x="36" y="28" width="2" height="4" fill="#bdbdbd"/>
  <rect x="26" y="36" width="2" height="4" fill="#bdbdbd"/>
  <rect x="36" y="36" width="2" height="4" fill="#bdbdbd"/>
  
  <!-- Arms -->
  <rect x="14" y="30" width="8" height="3" fill="#e0e0e0"/>
  <rect x="42" y="30" width="8" height="3" fill="#e0e0e0"/>
  
  <rect x="12" y="33" width="4" height="10" fill="#e0e0e0"/>
  <rect x="48" y="33" width="4" height="10" fill="#e0e0e0"/>
  
  <!-- Arm joints -->
  <rect x="11" y="36" width="6" height="2" fill="#bdbdbd"/>
  <rect x="47" y="36" width="6" height="2" fill="#bdbdbd"/>
  
  <!-- Hands -->
  <rect x="10" y="42" width="6" height="6" fill="#e0e0e0"/>
  <rect x="48" y="42" width="6" height="6" fill="#e0e0e0"/>
  
  <!-- Fingers -->
  <rect x="8" y="44" width="2" height="4" fill="#e0e0e0"/>
  <rect x="54" y="44" width="2" height="4" fill="#e0e0e0"/>
  
  <!-- Skull -->
  <rect x="24" y="12" width="16" height="16" fill="#f5f5f5"/>
  <rect x="22" y="14" width="20" height="12" fill="#e0e0e0"/>
  
  <!-- Eye sockets -->
  <rect x="26" y="18" width="4" height="4" fill="#000000"/>
  <rect x="34" y="18" width="4" height="4" fill="#000000"/>
  
  <!-- Eyes glowing -->
  <rect x="27" y="19" width="2" height="2" fill="#4fc3f7"/>
  <rect x="35" y="19" width="2" height="2" fill="#4fc3f7"/>
  
  <!-- Nose cavity -->
  <rect x="30" y="24" width="4" height="2" fill="#000000"/>
  
  <!-- Teeth -->
  <rect x="26" y="28" width="2" height="2" fill="#ffffff"/>
  <rect x="30" y="28" width="2" height="2" fill="#ffffff"/>
  <rect x="34" y="28" width="2" height="2" fill="#ffffff"/>
  
  <!-- Sword (Right Hand) -->
  <rect x="54" y="24" width="2" height="20" fill="#9e9e9e"/>
  <rect x="52" y="42" width="6" height="2" fill="#616161"/>
  <rect x="54" y="40" width="2" height="2" fill="#ffd700"/>
</svg>
