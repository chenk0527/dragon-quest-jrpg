<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Volcano Boss - Fire Lord -->
  <!-- Fire aura at bottom -->
  <rect x="6" y="40" width="4" height="8" fill="#FF5722"/>
  <rect x="10" y="38" width="4" height="10" fill="#FF9800"/>
  <rect x="14" y="40" width="4" height="8" fill="#FF5722"/>
  <rect x="18" y="36" width="4" height="12" fill="#FFC107"/>
  <rect x="22" y="38" width="4" height="10" fill="#FF9800"/>
  <rect x="26" y="36" width="4" height="12" fill="#FFC107"/>
  <rect x="30" y="40" width="4" height="8" fill="#FF5722"/>
  <rect x="34" y="38" width="4" height="10" fill="#FF9800"/>
  <rect x="38" y="40" width="4" height="8" fill="#FF5722"/>
  
  <!-- Legs - lava-like -->
  <rect x="10" y="30" width="10" height="10" fill="#BF360C"/>
  <rect x="28" y="30" width="10" height="10" fill="#BF360C"/>
  <rect x="12" y="32" width="6" height="6" fill="#FF5722"/>
  <rect x="30" y="32" width="6" height="6" fill="#FF5722"/>
  
  <!-- Body - dark volcanic rock -->
  <rect x="8" y="16" width="32" height="16" fill="#212121"/>
  <rect x="10" y="18" width="28" height="12" fill="#424242"/>
  
  <!-- Magma veins on body -->
  <rect x="12" y="20" width="4" height="2" fill="#FF5722"/>
  <rect x="20" y="22" width="8" height="2" fill="#FF5722"/>
  <rect x="32" y="20" width="4" height="2" fill="#FF5722"/>
  <rect x="16" y="26" width="6" height="2" fill="#FF9800"/>
  <rect x="26" y="26" width="6" height="2" fill="#FF9800"/>
  
  <!-- Chest core -->
  <rect x="20" y="20" width="8" height="8" fill="#FF5722"/>
  <rect x="22" y="22" width="4" height="4" fill="#FFEB3B"/>
  
  <!-- Arms -->
  <rect x="0" y="18" width="8" height="14" fill="#424242"/>
  <rect x="40" y="18" width="8" height="14" fill="#424242"/>
  <rect x="0" y="20" width="6" height="4" fill="#FF5722"/>
  <rect x="42" y="20" width="6" height="4" fill="#FF5722"/>
  
  <!-- Hands with flames -->
  <rect x="-2" y="30" width="6" height="8" fill="#212121"/>
  <rect x="44" y="30" width="6" height="8" fill="#212121"/>
  <rect x="-4" y="32" width="4" height="6" fill="#FF5722"/>
  <rect x="48" y="32" width="4" height="6" fill="#FF5722"/>
  
  <!-- Shoulder flames -->
  <rect x="4" y="14" width="6" height="6" fill="#FF5722"/>
  <rect x="38" y="14" width="6" height="6" fill="#FF5722"/>
  <rect x="6" y="12" width="4" height="4" fill="#FF9800"/>
  <rect x="38" y="12" width="4" height="4" fill="#FF9800"/>
  
  <!-- Head -->
  <rect x="14" y="6" width="20" height="12" fill="#212121"/>
  <rect x="16" y="8" width="16" height="8" fill="#424242"/>
  
  <!-- Eyes - burning -->
  <rect x="16" y="10" width="6" height="4" fill="#FFEB3B"/>
  <rect x="26" y="10" width="6" height="4" fill="#FFEB3B"/>
  <rect x="17" y="11" width="4" height="2" fill="#FFF"/>
  <rect x="27" y="11" width="4" height="2" fill="#FFF"/>
  
  <!-- Eye glow -->
  <rect x="15" y="9" width="2" height="6" fill="#FF5722"/>
  <rect x="31" y="9" width="2" height="6" fill="#FF5722"/>
  
  <!-- Horns -->
  <rect x="10" y="4" width="6" height="6" fill="#424242"/>
  <rect x="32" y="4" width="6" height="6" fill="#424242"/>
  <rect x="8" y="2" width="4" height="4" fill="#FF5722"/>
  <rect x="36" y="2" width="4" height="4" fill="#FF5722"/>
  <rect x="6" y="0" width="4" height="4" fill="#FF9800"/>
  <rect x="38" y="0" width="4" height="4" fill="#FF9800"/>
  
  <!-- Mouth - volcanic -->
  <rect x="18" y="16" width="12" height="2" fill="#FF5722"/>
</svg>