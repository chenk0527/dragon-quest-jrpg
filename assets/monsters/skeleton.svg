<!-- Skeleton Monster - Pixel Art Style SVG -->
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" fill="#1a1a2e"/>
  
  <!-- Body -->
  <rect x="26" y="32" width="12" height="16" fill="#ecf0f1"/>
  
  <!-- Ribs -->
  <rect x="28" y="34" width="8" height="2" fill="#bdc3c7"/>
  <rect x="28" y="38" width="8" height="2" fill="#bdc3c7"/>
  <rect x="28" y="42" width="8" height="2" fill="#bdc3c7"/>
  
  <!-- Skull -->
  <rect x="26" y="16" width="12" height="14" fill="#ecf0f1"/>
  
  <!-- Eyes -->
  <rect x="28" y="20" width="3" height="3" fill="#000"/>
  <rect x="33" y="20" width="3" height="3" fill="#000"/>
  
  <!-- Nose -->
  <rect x="30" y="24" width="2" height="2" fill="#000"/>
  
  <!-- Sword -->
  <rect x="42" y="24" width="3" height="24" fill="#95a5a6"/>
</svg>
