<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Wolf - Pixel Art -->
  <!-- Back legs -->
  <rect x="6" y="34" width="6" height="12" fill="#4A4A4A"/>
  <rect x="8" y="36" width="4" height="8" fill="#5A5A5A"/>
  <rect x="14" y="34" width="6" height="12" fill="#4A4A4A"/>
  <rect x="16" y="36" width="4" height="8" fill="#5A5A5A"/>
  
  <!-- Front legs -->
  <rect x="28" y="34" width="6" height="12" fill="#4A4A4A"/>
  <rect x="30" y="36" width="4" height="8" fill="#5A5A5A"/>
  <rect x="36" y="34" width="6" height="12" fill="#4A4A4A"/>
  <rect x="38" y="36" width="4" height="8" fill="#5A5A5A"/>
  
  <!-- Paws -->
  <rect x="6" y="44" width="6" height="4" fill="#2A2A2A"/>
  <rect x="14" y="44" width="6" height="4" fill="#2A2A2A"/>
  <rect x="28" y="44" width="6" height="4" fill="#2A2A2A"/>
  <rect x="36" y="44" width="6" height="4" fill="#2A2A2A"/>
  
  <!-- Body -->
  <rect x="8" y="22" width="32" height="16" fill="#5A5A5A"/>
  <rect x="10" y="24" width="28" height="12" fill="#6A6A6A"/>
  
  <!-- Chest fur -->
  <rect x="26" y="26" width="10" height="8" fill="#7A7A7A"/>
  <rect x="28" y="28" width="6" height="4" fill="#8A8A8A"/>
  
  <!-- Tail -->
  <rect x="0" y="28" width="8" height="6" fill="#4A4A4A"/>
  <rect x="0" y="26" width="4" height="4" fill="#5A5A5A"/>
  <rect x="-2" y="24" width="4" height="4" fill="#6A6A6A"/>
  
  <!-- Head -->
  <rect x="28" y="12" width="18" height="14" fill="#5A5A5A"/>
  <rect x="30" y="14" width="14" height="10" fill="#6A6A6A"/>
  
  <!-- Snout -->
  <rect x="42" y="18" width="6" height="6" fill="#7A7A7A"/>
  <rect x="46" y="20" width="2" height="2" fill="#2A2A2A"/>
  
  <!-- Ears - pointed -->
  <rect x="30" y="6" width="4" height="8" fill="#4A4A4A"/>
  <rect x="40" y="6" width="4" height="8" fill="#4A4A4A"/>
  <rect x="31" y="4" width="2" height="4" fill="#2A2A2A"/>
  <rect x="41" y="4" width="2" height="4" fill="#2A2A2A"/>
  
  <!-- Eyes - fierce yellow -->
  <rect x="32" y="16" width="4" height="4" fill="#FFEB3B"/>
  <rect x="38" y="16" width="4" height="4" fill="#FFEB3B"/>
  <rect x="33" y="17" width="2" height="2" fill="#000"/>
  <rect x="39" y="17" width="2" height="2" fill="#000"/>
  
  <!-- Nose -->
  <rect x="44" y="18" width="4" height="3" fill="#2A2A2A"/>
  
  <!-- Mouth -->
  <rect x="38" y="22" width="8" height="2" fill="#2A2A2A"/>
  <rect x="40" y="22" width="2" height="2" fill="#FFF"/>
  <rect x="44" y="22" width="2" height="2" fill="#FFF"/>
  
  <!-- Fur details -->
  <rect x="12" y="26" width="4" height="4" fill="#4A4A4A"/>
  <rect x="20" y="28" width="4" height="4" fill="#4A4A4A"/>
  <rect x="16" y="24" width="2" height="2" fill="#3A3A3A"/>
</svg>