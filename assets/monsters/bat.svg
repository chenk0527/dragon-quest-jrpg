<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Bat - Pixel Art -->
  <!-- Wings - left wing spread -->
  <rect x="0" y="16" width="8" height="4" fill="#2D004D"/>
  <rect x="0" y="12" width="6" height="6" fill="#4B0082"/>
  <rect x="2" y="8" width="6" height="6" fill="#2D004D"/>
  <rect x="4" y="4" width="6" height="6" fill="#4B0082"/>
  <rect x="6" y="0" width="6" height="6" fill="#2D004D"/>
  <rect x="8" y="2" width="4" height="4" fill="#663399"/>
  
  <!-- Wing membrane left -->
  <rect x="6" y="14" width="6" height="8" fill="#1A0033"/>
  <rect x="8" y="10" width="4" height="10" fill="#2D004D"/>
  
  <!-- Wings - right wing spread -->
  <rect x="40" y="16" width="8" height="4" fill="#2D004D"/>
  <rect x="42" y="12" width="6" height="6" fill="#4B0082"/>
  <rect x="40" y="8" width="6" height="6" fill="#2D004D"/>
  <rect x="38" y="4" width="6" height="6" fill="#4B0082"/>
  <rect x="36" y="0" width="6" height="6" fill="#2D004D"/>
  <rect x="36" y="2" width="4" height="4" fill="#663399"/>
  
  <!-- Wing membrane right -->
  <rect x="36" y="14" width="6" height="8" fill="#1A0033"/>
  <rect x="36" y="10" width="4" height="10" fill="#2D004D"/>
  
  <!-- Body -->
  <rect x="16" y="20" width="16" height="16" fill="#2D004D"/>
  <rect x="18" y="22" width="12" height="12" fill="#4B0082"/>
  
  <!-- Belly fur -->
  <rect x="20" y="26" width="8" height="6" fill="#663399"/>
  <rect x="22" y="28" width="4" height="4" fill="#8A2BE2"/>
  
  <!-- Head -->
  <rect x="18" y="10" width="12" height="12" fill="#4B0082"/>
  <rect x="20" y="12" width="8" height="8" fill="#663399"/>
  
  <!-- Ears -->
  <rect x="16" y="6" width="4" height="6" fill="#2D004D"/>
  <rect x="28" y="6" width="4" height="6" fill="#2D004D"/>
  <rect x="16" y="4" width="2" height="4" fill="#1A0033"/>
  <rect x="30" y="4" width="2" height="4" fill="#1A0033"/>
  
  <!-- Eyes - glowing red -->
  <rect x="20" y="14" width="3" height="3" fill="#FF0000"/>
  <rect x="25" y="14" width="3" height="3" fill="#FF0000"/>
  <rect x="21" y="15" width="1" height="1" fill="#FFF"/>
  <rect x="26" y="15" width="1" height="1" fill="#FFF"/>
  
  <!-- Snout -->
  <rect x="22" y="18" width="4" height="4" fill="#1A0033"/>
  <rect x="23" y="17" width="2" height="2" fill="#000"/>
  
  <!-- Feet -->
  <rect x="16" y="34" width="4" height="4" fill="#2D004D"/>
  <rect x="28" y="34" width="4" height="4" fill="#2D004D"/>
  <rect x="16" y="38" width="2" height="2" fill="#1A0033"/>
  <rect x="30" y="38" width="2" height="2" fill="#1A0033"/>
  
  <!-- Wing claws -->
  <rect x="10" y="4" width="2" height="2" fill="#000"/>
  <rect x="36" y="4" width="2" height="2" fill="#000"/>
</svg>