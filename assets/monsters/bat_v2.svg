<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Bat Pixel Art - 64x64 -->
  <!-- Shadow -->
  <ellipse cx="32" cy="54" rx="10" ry="3" fill="#000000" opacity="0.3"/>
  
  <!-- Wings spread -->
  <rect x="4" y="20" width="20" height="16" fill="#4a148c"/>
  <rect x="40" y="20" width="20" height="16" fill="#4a148c"/>
  
  <!-- Wing membranes -->
  <rect x="6" y="24" width="14" height="10" fill="#6a1b9a" opacity="0.7"/>
  <rect x="44" y="24" width="14" height="10" fill="#6a1b9a" opacity="0.7"/>
  
  <!-- Wing bones -->
  <rect x="8" y="20" width="2" height="14" fill="#38006b"/>
  <rect x="54" y="20" width="2" height="14" fill="#38006b"/>
  
  <!-- Wing tips -->
  <rect x="2" y="28" width="4" height="6" fill="#38006b"/>
  <rect x="58" y="28" width="4" height="6" fill="#38006b"/>
  
  <!-- Body -->
  <rect x="28" y="28" width="8" height="12" fill="#4a148c"/>
  
  <!-- Belly -->
  <rect x="30" y="32" width="4" height="6" fill="#7b1fa2"/>
  
  <!-- Head -->
  <rect x="28" y="18" width="8" height="10" fill="#4a148c"/>
  
  <!-- Ears - Pointed -->
  <rect x="26" y="14" width="3" height="6" fill="#4a148c"/>
  <rect x="35" y="14" width="3" height="6" fill="#4a148c"/>
  
  <rect x="27" y="12" width="2" height="4" fill="#38006b"/>
  <rect x="35" y="12" width="2" height="4" fill="#38006b"/>
  
  <!-- Eyes - Red -->
  <rect x="29" y="22" width="2" height="2" fill="#ff0000"/>
  <rect x="33" y="22" width="2" height="2" fill="#ff0000"/>
  
  <!-- Eye glow -->
  <rect x="28" y="21" width="4" height="4" fill="#ff0000" opacity="0.3"/>
  <rect x="32" y="21" width="4" height="4" fill="#ff0000" opacity="0.3"/>
  
  <!-- Mouth - Small fangs -->
  <rect x="30" y="26" width="4" height="1" fill="#000000"/>
  
  <rect x="29" y="25" width="1" height="2" fill="#ffffff"/>
  <rect x="34" y="25" width="1" height="2" fill="#ffffff"/>
  
  <!-- Feet -->
  <rect x="28" y="40" width="2" height="4" fill="#38006b"/>
  <rect x="34" y="40" width="2" height="4" fill="#38006b"/>
  
  <!-- Wing movement blur -->
  <rect x="2" y="22" width="2" height="4" fill="#6a1b9a" opacity="0.4"/>
  <rect x="60" y="22" width="2" height="4" fill="#6a1b9a" opacity="0.4"/>
</svg>