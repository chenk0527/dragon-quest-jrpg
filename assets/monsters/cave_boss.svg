<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Cave Boss - Cave Troll -->
  <!-- Legs -->
  <rect x="10" y="38" width="10" height="10" fill="#5D4037"/>
  <rect x="28" y="38" width="10" height="10" fill="#5D4037"/>
  <rect x="8" y="40" width="4" height="8" fill="#4E342E"/>
  <rect x="36" y="40" width="4" height="8" fill="#4E342E"/>
  
  <!-- Body -->
  <rect x="8" y="22" width="32" height="18" fill="#795548"/>
  <rect x="10" y="24" width="28" height="14" fill="#8D6E63"/>
  
  <!-- Belly -->
  <rect x="16" y="28" width="16" height="10" fill="#A1887F"/>
  
  <!-- Chest muscles -->
  <rect x="14" y="26" width="6" height="6" fill="#6D4C41"/>
  <rect x="28" y="26" width="6" height="6" fill="#6D4C41"/>
  
  <!-- Arms -->
  <rect x="0" y="26" width="8" height="12" fill="#795548"/>
  <rect x="40" y="26" width="8" height="12" fill="#795548"/>
  <rect x="0" y="36" width="6" height="6" fill="#5D4037"/>
  <rect x="42" y="36" width="6" height="6" fill="#5D4037"/>
  
  <!-- Head -->
  <rect x="12" y="8" width="24" height="16" fill="#795548"/>
  <rect x="14" y="10" width="20" height="12" fill="#8D6E63"/>
  
  <!-- Ears -->
  <rect x="8" y="10" width="4" height="6" fill="#6D4C41"/>
  <rect x="36" y="10" width="4" height="6" fill="#6D4C41"/>
  <rect x="6" y="8" width="4" height="4" fill="#5D4037"/>
  <rect x="38" y="8" width="4" height="4" fill="#5D4037"/>
  
  <!-- Eyes - angry -->
  <rect x="16" y="14" width="5" height="4" fill="#FF5722"/>
  <rect x="27" y="14" width="5" height="4" fill="#FF5722"/>
  <rect x="17" y="15" width="3" height="2" fill="#000"/>
  <rect x="28" y="15" width="3" height="2" fill="#000"/>
  
  <!-- Eyebrow ridge -->
  <rect x="14" y="12" width="9" height="2" fill="#3E2723"/>
  <rect x="25" y="12" width="9" height="2" fill="#3E2723"/>
  
  <!-- Nose -->
  <rect x="21" y="18" width="6" height="4" fill="#5D4037"/>
  <rect x="22" y="19" width="4" height="2" fill="#3E2723"/>
  
  <!-- Mouth with tusks -->
  <rect x="16" y="22" width="16" height="4" fill="#3E2723"/>
  <rect x="14" y="20" width="4" height="4" fill="#FFF"/>
  <rect x="30" y="20" width="4" height="4" fill="#FFF"/>
  <rect x="15" y="21" width="2" height="2" fill="#DDD"/>
  <rect x="31" y="21" width="2" height="2" fill="#DDD"/>
  
  <!-- Horn on head -->
  <rect x="20" y="4" width="8" height="4" fill="#5D4037"/>
  <rect x="22" y="2" width="4" height="2" fill="#4E342E"/>
  
  <!-- Club on back -->
  <rect x="38" y="6" width="6" height="16" fill="#4E342E"/>
  <rect x="36" y="18" width="10" height="6" fill="#5D4037"/>
</svg>