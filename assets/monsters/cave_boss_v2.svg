<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Cave Boss - Cave Troll - 64x64 -->
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="22" ry="6" fill="#000000" opacity="0.3"/>
  
  <!-- Legs - Large -->
  <rect x="18" y="44" width="10" height="14" fill="#5d4037"/>
  <rect x="36" y="44" width="10" height="14" fill="#5d4037"/>
  
  <!-- Feet -->
  <rect x="16" y="54" width="14" height="4" fill="#4e342e"/>
  <rect x="34" y="54" width="14" height="4" fill="#4e342e"/>
  
  <!-- Toenails -->
  <rect x="17" y="56" width="2" height="2" fill="#9e9e9e"/>
  <rect x="21" y="56" width="2" height="2" fill="#9e9e9e"/>
  <rect x="35" y="56" width="2" height="2" fill="#9e9e9e"/>
  <rect x="39" y="56" width="2" height="2" fill="#9e9e9e"/>
  
  <!-- Body - Large muscular -->
  <rect x="16" y="26" width="32" height="22" fill="#795548"/>
  
  <!-- Belly -->
  <rect x="24" y="32" width="16" height="12" fill="#8d6e63"/>
  
  <!-- Chest -->
  <rect x="20" y="28" width="24" height="8" fill="#6d4c41"/>
  
  <!-- Arms - Huge -->
  <rect x="6" y="30" width="12" height="14" fill="#795548"/>
  <rect x="46" y="30" width="12" height="14" fill="#795548"/>
  
  <!-- Hands -->
  <rect x="4" y="40" width="10" height="8" fill="#6d4c41"/>
  <rect x="50" y="40" width="10" height="8" fill="#6d4c41"/>
  
  <!-- Head - Large -->
  <rect x="22" y="10" width="20" height="18" fill="#795548"/>
  
  <!-- Jaw -->
  <rect x="20" y="24" width="24" height="8" fill="#6d4c41"/>
  
  <!-- Ears -->
  <rect x="18" y="12" width="6" height="6" fill="#5d4037"/>
  <rect x="40" y="12" width="6" height="6" fill="#5d4037"/>
  
  <!-- Eyes - Small angry -->
  <rect x="26" y="18" width="4" height="3" fill="#ffeb3b"/>
  <rect x="34" y="18" width="4" height="3" fill="#ffeb3b"/>
  
  <rect x="27" y="19" width="2" height="1" fill="#ff0000"/>
  <rect x="35" y="19" width="2" height="1" fill="#ff0000"/>
  
  <!-- Nose -->
  <rect x="29" y="22" width="6" height="3" fill="#4e342e"/>
  
  <!-- Mouth - Tusks -->
  <rect x="26" y="28" width="12" height="2" fill="#3e2723"/>
  
  <rect x="24" y="26" width="3" height="6" fill="#e0e0e0"/>
  <rect x="37" y="26" width="3" height="6" fill="#e0e0e0"/>
  
  <!-- Club (Right Hand) -->
  <rect x="54" y="28" width="8" height="24" fill="#5d4037"/>
  
  <rect x="52" y="28" width="12" height="6" fill="#4e342e"/>
  
  <!-- Spikes on club -->
  <rect x="52" y="26" width="2" height="2" fill="#9e9e9e"/>
  <rect x="62" y="26" width="2" height="2" fill="#9e9e9e"/>
  <rect x="54" y="24" width="2" height="2" fill="#9e9e9e"/>
  
  <!-- Slobber -->
  <rect x="32" y="30" width="2" height="4" fill="#87ceeb" opacity="0.6"/>
</svg>