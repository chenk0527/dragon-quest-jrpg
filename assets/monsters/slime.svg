<!-- Slime Monster - Pixel Art Style SVG -->
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" fill="#1a1a2e"/>
  <!-- Slime Body -->
  <ellipse cx="32" cy="40" rx="20" ry="16" fill="#2ecc71"/>
  <!-- Shine -->
  <ellipse cx="26" cy="34" rx="6" ry="4" fill="#58d68d"/>
  
  <!-- Eyes -->
  <rect x="24" y="36" width="4" height="4" fill="#fff"/>
  <rect x="36" y="36" width="4" height="4" fill="#fff"/>
  <rect x="25" y="37" width="2" height="2" fill="#000"/>
  <rect x="37" y="37" width="2" height="2" fill="#000"/>
  
  <!-- Mouth -->
  <rect x="28" y="44" width="8" height="2" fill="#145a32"/>
</svg>
