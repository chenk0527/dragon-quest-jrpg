  <rect x="18" y="18" width="12" height="2" fill="#000"/>
  
  <!-- Floating runes around head -->
  <rect x="36" y="8" width="4" height="4" fill="#8A2BE2"/>
  <rect x="38" y="10" width="2" height="2" fill="#FFF"/>
  <rect x="8" y="10" width="4" height="4" fill="#8A2BE2"/>
  <rect x="10" y="12" width="2" height="2" fill="#FFF"/>
