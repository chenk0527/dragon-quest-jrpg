<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Final Boss - Chaos Demon King -->
  <!-- Dark aura/shadow -->
  <rect x="4" y="42" width="40" height="6" fill="#1A0033"/>
  <rect x="2" y="40" width="4" height="4" fill="#1A0033"/>
  <rect x="42" y="40" width="4" height="4" fill="#1A0033"/>
  
  <!-- Cloak bottom -->
  <rect x="6" y="32" width="36" height="12" fill="#2D004D"/>
  <rect x="8" y="34" width="32" height="8" fill="#3D0066"/>
  <rect x="10" y="36" width="4" height="6" fill="#4A0080"/>
  <rect x="20" y="36" width="8" height="6" fill="#4A0080"/>
  <rect x="34" y="36" width="4" height="6" fill="#4A0080"/>
  
  <!-- Body armor -->
  <rect x="10" y="20" width="28" height="14" fill="#1a1a2e"/>
  <rect x="12" y="22" width="24" height="10" fill="#252545"/>
  
  <!-- Chest chaos symbol -->
  <rect x="18" y="24" width="12" height="8" fill="#4B0082"/>
  <rect x="20" y="26" width="8" height="4" fill="#8A2BE2"/>
  <rect x="22" y="27" width="4" height="2" fill="#FFF"/>
  
  <!-- Shoulder armor - spiked -->
  <rect x="2" y="18" width="10" height="12" fill="#2D004D"/>
  <rect x="36" y="18" width="10" height="12" fill="#2D004D"/>
  <rect x="0" y="16" width="6" height="6" fill="#4B0082"/>
  <rect x="42" y="16" width="6" height="6" fill="#4B0082"/>
  <rect x="0" y="14" width="4" height="4" fill="#8A2BE2"/>
  <rect x="44" y="14" width="4" height="4" fill="#8A2BE2"/>
  
