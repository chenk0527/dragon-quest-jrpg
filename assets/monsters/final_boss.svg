  <rect x="42" y="22" width="10" height="10" fill="#1a1a2e"/>
  
  <!-- Hands holding dark orbs -->
  <rect x="-6" y="30" width="8" height="8" fill="#2D004D"/>
  <rect x="46" y="30" width="8" height="8" fill="#2D004D"/>
  <rect x="-4" y="28" width="4" height="6" fill="#8A2BE2"/>
  <rect x="48" y="28" width="4" height="6" fill="#8A2BE2"/>
  
  <!-- Giant sword on back -->
  <rect x="22" y="-4" width="4" height="30" fill="#4B0082"/>
  <rect x="20" y="-2" width="8" height="20" fill="#2D004D"/>
  <rect x="18" y="0" width="12" height="4" fill="#8A2BE2"/>
  <rect x="20" y="-6" width="8" height="4" fill="#8A2BE2"/>
  
  <!-- Head -->
  <rect x="14" y="8" width="20" height="14" fill="#1a1a2e"/>
  <rect x="16" y="10" width="16" height="10" fill="#252545"/>
  
  <!-- Helmet/Horns -->
  <rect x="10" y="6" width="6" height="10" fill="#2D004D"/>
  <rect x="32" y="6" width="6" height="10" fill="#2D004D"/>
  <rect x="8" y="4" width="4" height="8" fill="#4B0082"/>
  <rect x="36" y="4" width="4" height="8" fill="#4B0082"/>
  <rect x="6" y="2" width="4" height="6" fill="#8A2BE2"/>
  <rect x="38" y="2" width="4" height="6" fill="#8A2BE2"/>
  <rect x="4" y="0" width="4" height="4" fill="#9370DB"/>
  <rect x="40" y="0" width="4" height="4" fill="#9370DB"/>
  
  <!-- Crown -->
  <rect x="14" y="4" width="20" height="6" fill="#FFD700"/>
  <rect x="16" y="2" width="4" height="4" fill="#FFA500"/>
  <rect x="22" y="2" width="4" height="4" fill="#FFA500"/>
  <rect x="28" y="2" width="4" height="4" fill="#FFA500"/>
  <rect x="17" y="1" width="2" height="3" fill="#FF5722"/>
  <rect x="23" y="1" width="2" height="3" fill="#FF5722"/>
  <rect x="29" y="1" width="2" height="3" fill="#FF5722"/>
  
  <!-- Eyes - glowing red evil -->
