<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Volcano Boss - Fire Lord - 64x64 -->
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="18" ry="5" fill="#000000" opacity="0.4"/>
  
  <!-- Legs - Lava rock -->
  <rect x="22" y="44" width="8" height="12" fill="#3e2723"/>
  <rect x="34" y="44" width="8" height="12" fill="#3e2723"/>
  
  <!-- Lava cracks on legs -->
  <rect x="24" y="48" width="2" height="4" fill="#ff5722"/>
  <rect x="36" y="50" width="2" height="4" fill="#ff5722"/>
  
  <!-- Feet -->
  <rect x="20" y="54" width="10" height="4" fill="#212121"/>
  <rect x="34" y="54" width="10" height="4" fill="#212121"/>
  
  <!-- Body - Magma -->
  <rect x="20" y="28" width="24" height="18" fill="#bf360c"/>
  
  <!-- Body lava glow -->
  <rect x="24" y="32" width="16" height="10" fill="#ff5722"/>
  
  <rect x="28" y="36" width="8" height="4" fill="#ff9800"/>
  
  <!-- Body cracks -->
  <rect x="22" y="34" width="4" height="1" fill="#3e2723"/>
  <rect x="38" y="38" width="4" height="1" fill="#3e2723"/>
  
  <!-- Chest - Dark armor -->
  <rect x="24" y="30" width="16" height="8" fill="#212121"/>
  
  <!-- Chest symbol - Fire -->
  <rect x="30" y="32" width="4" height="4" fill="#ff5722"/>
  
  <!-- Arms -->
  <rect x="12" y="30" width="10" height="10" fill="#bf360c"/>
  <rect x="42" y="30" width="10" height="10" fill="#bf360c"/>
  
  <!-- Arm lava -->
  <rect x="14" y="34" width="4" height="4" fill="#ff5722"/>
  <rect x="46" y="34" width="4" height="4" fill="#ff5722"/>
  
  <!-- Hands -->
  <rect x="10" y="38" width="8" height="6" fill="#3e2723"/>
  <rect x="46" y="38" width="8" height="6" fill="#3e2723"/>
  
  <!-- Head - Flame shape -->
  <rect x="26" y="12" width="12" height="16" fill="#bf360c"/>
  
  <!-- Head inner fire -->
  <rect x="28" y="14" width="8" height="12" fill="#ff5722"/>
  
  <rect x="30" y="18" width="4" height="6" fill="#ff9800"/>
  
  <!-- Eyes - Burning -->
  <rect x="28" y="18" width="3" height="3" fill="#ffeb3b"/>
  <rect x="33" y="18" width="3" height="3" fill="#ffeb3b"/>
  
  <rect x="29" y="19" width="1" height="1" fill="#ffffff"/>
  <rect x="34" y="19" width="1" height="1" fill="#ffffff"/>
  
  <!-- Eye glow -->
  <rect x="27" y="17" width="5" height="5" fill="#ffeb3b" opacity="0.3"/>
  <rect x="32" y="17" width="5" height="5" fill="#ffeb3b" opacity="0.3"/>
  
  <!-- Flame crown -->
  <rect x="24" y="8" width="4" height="6" fill="#ff5722"/>
  <rect x="30" y="6" width="4" height="8" fill="#ff9800"/>
  <rect x="36" y="8" width="4" height="6" fill="#ff5722"/>
  
  <!-- Crown tips -->
  <rect x="25" y="6" width="2" height="4" fill="#ff9800"/>
  <rect x="31" y="4" width="2" height="4" fill="#ffeb3b"/>
  <rect x="37" y="6" width="2" height="4" fill="#ff9800"/>
  
  <!-- Flame sword (Right Hand) -->
  <rect x="54" y="20" width="4" height="24" fill="#ff5722"/>
  
  <rect x="52" y="42" width="8" height="3" fill="#212121"/>
  
  <!-- Sword flame effect -->
  <rect x="55" y="16" width="2" height="6" fill="#ff9800"/>
  <rect x="55" y="14" width="2" height="2" fill="#ffeb3b"/>
  
  <!-- Ambient flames -->
  <rect x="18" y="26" width="2" height="2" fill="#ff5722" opacity="0.6"/>
  <rect x="44" y="26" width="2" height="2" fill="#ff5722" opacity="0.6"/>
  <rect x="16" y="42" width="2" height="3" fill="#ff9800" opacity="0.5"/>
  <rect x="46" y="44" width="2" height="2" fill="#ff9800" opacity="0.5"/>
</svg>