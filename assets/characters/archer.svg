<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Archer Class Sprite -->
  <!-- Boots -->
  <rect x="12" y="36" width="8" height="12" fill="#8B4513"/>
  <rect x="28" y="36" width="8" height="12" fill="#8B4513"/>
  
