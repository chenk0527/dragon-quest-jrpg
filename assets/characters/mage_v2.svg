<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Mage Pixel Art - 64x64 -->
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="14" ry="4" fill="#000000" opacity="0.3"/>
  
  <!-- Robe - Purple -->
  <rect x="20" y="32" width="24" height="24" fill="#663399"/>
  <rect x="18" y="36" width="4" height="16" fill="#552288"/>
  <rect x="42" y="36" width="4" height="16" fill="#552288"/>
  
  <!-- Robe trim - Gold -->
  <rect x="20" y="32" width="24" height="4" fill="#ffd700"/>
  <rect x="20" y="52" width="24" height="4" fill="#ffd700"/>
  
  <!-- Robe center pattern -->
  <rect x="28" y="40" width="8" height="8" fill="#8855bb"/>
  <rect x="30" y="42" width="4" height="4" fill="#ffd700"/>
  
  <!-- Sleeves -->
  <rect x="10" y="34" width="10" height="12" fill="#663399"/>
  <rect x="44" y="34" width="10" height="12" fill="#663399"/>
  
  <!-- Sleeve trim -->
  <rect x="10" y="34" width="10" height="3" fill="#ffd700"/>
  <rect x="44" y="34" width="10" height="3" fill="#ffd700"/>
  
  <!-- Hands -->
  <rect x="8" y="42" width="6" height="6" fill="#d4a574"/>
  <rect x="50" y="42" width="6" height="6" fill="#d4a574"/>
  
  <!-- Head -->
  <rect x="24" y="14" width="16" height="16" fill="#d4a574"/>
  
  <!-- Hair - White/Silver -->
  <rect x="22" y="10" width="20" height="8" fill="#e0e0e0"/>
  <rect x="20" y="14" width="4" height="10" fill="#e0e0e0"/>
  <rect x="40" y="14" width="4" height="10" fill="#e0e0e0"/>
  <rect x="22" y="8" width="20" height="4" fill="#f0f0f0"/>
  
  <!-- Long hair flowing -->
  <rect x="18" y="20" width="4" height="14" fill="#e0e0e0"/>
  <rect x="42" y="20" width="4" height="14" fill="#e0e0e0"/>
  
  <!-- Eyes - Blue -->
  <rect x="28" y="22" width="3" height="3" fill="#4a90e2"/>
  <rect x="33" y="22" width="3" height="3" fill="#4a90e2"/>
  <rect x="29" y="23" width="1" height="1" fill="#ffffff"/>
  <rect x="34" y="23" width="1" height="1" fill="#ffffff"/>
  
  <!-- Nose -->
  <rect x="31" y="26" width="2" height="2" fill="#c49365"/>
  
  <!-- Mouth -->
  <rect x="30" y="30" width="4" height="2" fill="#a67b5b"/>
  
  <!-- Hat - Wizard Hat -->
  <rect x="28" y="4" width="8" height="8" fill="#663399"/>
  <rect x="24" y="8" width="16" height="4" fill="#552288"/>
  <rect x="20" y="10" width="24" height="4" fill="#663399"/>
  
  <!-- Hat point -->
  <rect x="30" y="0" width="4" height="4" fill="#663399"/>
  
  <!-- Hat star -->
  <rect x="30" y="2" width="4" height="4" fill="#ffd700"/>
  
  <!-- Staff (Left Hand) -->
  <rect x="6" y="16" width="4" height="42" fill="#8b4513"/>
  
  <!-- Staff gem -->
  <rect x="4" y="14" width="8" height="8" fill="#4a90e2"/>
  <rect x="6" y="16" width="4" height="4" fill="#87ceeb"/>
  
  <!-- Staff glow -->
  <rect x="5" y="15" width="6" height="6" fill="#87ceeb" opacity="0.5"/>
  
  <!-- Magic particles -->
  <rect x="52" y="20" width="2" height="2" fill="#ffd700"/>
  <rect x="56" y="26" width="2" height="2" fill="#87ceeb"/>
  <rect x="54" y="32" width="2" height="2" fill="#ffd700"/>
</svg>
