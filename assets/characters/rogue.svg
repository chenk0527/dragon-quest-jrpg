<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Rogue Class Sprite -->
  <!-- Boots - dark leather -->
  <rect x="12" y="36" width="8" height="12" fill="#1a1a1a"/>
  <rect x="28" y="36" width="8" height="12" fill="#1a1a1a"/>
  <rect x="10" y="38" width="4" height="8" fill="#000"/>
  <rect x="34" y="38" width="4" height="8" fill="#000"/>
  
  <!-- Leggings -->
  <rect x="12" y="28" width="8" height="10" fill="#2c3e50"/>
  <rect x="28" y="28" width="8" height="10" fill="#2c3e50"/>
  
  <!-- Body armor - dark -->
  <rect x="12" y="20" width="24" height="10" fill="#1a1a2e"/>
  <rect x="14" y="22" width="20" height="6" fill="#252545"/>
  
  <!-- Belt with pouches -->
  <rect x="12" y="28" width="24" height="3" fill="#4a3728"/>
  <rect x="20" y="27" width="8" height="4" fill="#5c4033"/>
  <rect x="22" y="28" width="4" height="2" fill="#ffd700"/>
  
  <!-- Arms -->
  <rect x="4" y="22" width="8" height="10" fill="#1a1a2e"/>
  <rect x="36" y="22" width="8" height="10" fill="#1a1a2e"/>
  
  <!-- Gloves -->
  <rect x="2" y="30" width="6" height="6" fill="#2c2c2c"/>
  <rect x="40" y="30" width="6" height="6" fill="#2c2c2c"/>
  
  <!-- Daggers -->
  <rect x="0" y="24" width="4" height="12" fill="#c0c0c0"/>
  <rect x="-2" y="34" width="4" height="6" fill="#8b4513"/>
  <rect x="44" y="24" width="4" height="12" fill="#c0c0c0"/>
  <rect x="46" y="34" width="4" height="6" fill="#8b4513"/>
  
  <!-- Head/Hood -->
  <rect x="16" y="8" width="16" height="14" fill="#1a1a2e"/>
  <rect x="18" y="10" width="12" height="10" fill="#252545"/>
  
  <!-- Face -->
  <rect x="18" y="14" width="12" height="6" fill="#f4a460"/>
  
  <!-- Mask -->
  <rect x="16" y="12" width="16" height="4" fill="#2c2c2c"/>
  <rect x="18" y="14" width="12" height="2" fill="#1a1a1a"/>
  
  <!-- Eyes -->
  <rect x="20" y="16" width="3" height="2" fill="#fff"/>
  <rect x="25" y="16" width="3" height="2" fill="#fff"/>
  <rect x="21" y="16" width="1" height="2" fill="#000"/>
  <rect x="26" y="16" width="1" height="2" fill="#000"/>
  
  <!-- Hood details -->
  <rect x="14" y="10" width="2" height="8" fill="#1a1a2e"/>
  <rect x="32" y="10" width="2" height="8" fill="#1a1a2e"/>
  
  <!-- Scarf/Cape -->
  <rect x="14" y="20" width="4" height="8" fill="#8b0000"/>
  <rect x="30" y="20" width="4" height="8" fill="#8b0000"/>
</svg>