<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Priest Class Sprite -->
  <!-- Robe bottom -->
  <rect x="10" y="32" width="28" height="16" fill="#F5F5F5"/>
  <rect x="12" y="34" width="24" height="12" fill="#FFF"/>
  
  <!-- Robe folds -->
  <rect x="14" y="36" width="4" height="8" fill="#E0E0E0"/>
  <rect x="22" y="38" width="4" height="6" fill="#E0E0E0"/>
  <rect x="30" y="36" width="4" height="8" fill="#E0E0E0"/>
  
  <!-- Gold trim on bottom -->
  <rect x="10" y="44" width="28" height="2" fill="#FFD700"/>
  
  <!-- Torso -->
  <rect x="12" y="20" width="24" height="14" fill="#FFF"/>
  <rect x="14" y="22" width="20" height="10" fill="#F5F5F5"/>
  
  <!-- Gold trim on chest -->
  <rect x="12" y="20" width="24" height="3" fill="#FFD700"/>
  <rect x="22" y="26" width="4" height="4" fill="#FFD700"/>
  
  <!-- Cross symbol -->
  <rect x="20" y="24" width="8" height="2" fill="#DC143C"/>
  <rect x="23" y="22" width="2" height="6" fill="#DC143C"/>
  
  <!-- Sleeves -->
  <rect x="4" y="22" width="8" height="10" fill="#FFF"/>
  <rect x="36" y="22" width="8" height="10" fill="#FFF"/>
  <rect x="6" y="24" width="4" height="6" fill="#F5F5F5"/>
  <rect x="38" y="24" width="4" height="6" fill="#F5F5F5"/>
  
  <rect x="4" y="30" width="8" height="3" fill="#FFD700"/>
  <rect x="36" y="30" width="8" height="3" fill="#FFD700"/>
  
  <!-- Hands -->
  <rect x="2" y="30" width="6" height="6" fill="#F4A460"/>
  <rect x="40" y="30" width="6" height="6" fill="#F4A460"/>
  
  <!-- Holy Staff -->
  <rect x="0" y="6" width="4" height="36" fill="#8B4513"/>
  <rect x="-2" y="4" width="8" height="4" fill="#FFD700"/>
  <rect x="-4" y="0" width="4" height="6" fill="#FFD700"/>
  <rect x="4" y="0" width="4" height="6" fill="#FFD700"/>
  <rect x="-2" y="2" width="8" height="4" fill="#FFA500"/>
  
  <!-- Head -->
  <rect x="16" y="10" width="16" height="12" fill="#F4A460"/>
  <rect x="18" y="12" width="12" height="8" fill="#FFDEAD"/>
  
  <!-- Hood -->
  <rect x="14" y="8" width="20" height="6" fill="#FFF"/>
  <rect x="12" y="10" width="4" height="8" fill="#F5F5F5"/>
  <rect x="32" y="10" width="4" height="8" fill="#F5F5F5"/>
  
  <!-- Gold trim on hood -->
  <rect x="14" y="12" width="20" height="2" fill="#FFD700"/>
  
  <!-- Eyes -->
  <rect x="19" y="16" width="3" height="3" fill="#000"/>
  <rect x="26" y="16" width="3" height="3" fill="#000"/>
  
  <!-- Mouth - gentle smile -->
  <rect x="21" y="20" width="6" height="2" fill="#8B4513"/>
</svg>