<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Mage Class Sprite -->
  <!-- Robe bottom -->
  <rect x="10" y="30" width="28" height="18" fill="#4B0082"/>
  <rect x="12" y="32" width="24" height="14" fill="#663399"/>
  
  <!-- Robe folds -->
  <rect x="14" y="34" width="4" height="10" fill="#4B0082"/>
  <rect x="22" y="36" width="4" height="8" fill="#4B0082"/>
  <rect x="30" y="34" width="4" height="10" fill="#4B0082"/>
  
  <!-- Torso -->
  <rect x="12" y="20" width="24" height="12" fill="#663399"/>
  <rect x="14" y="22" width="20" height="8" fill="#8A2BE2"/>
  
  <!-- Gold trim -->
  <rect x="12" y="28" width="24" height="3" fill="#FFD700"/>
  <rect x="18" y="24" width="4" height="4" fill="#FFD700"/>
  <rect x="26" y="24" width="4" height="4" fill="#FFD700"/>
  
  <!-- Sleeves -->
  <rect x="4" y="22" width="8" height="10" fill="#4B0082"/>
  <rect x="36" y="22" width="8" height="10" fill="#4B0082"/>
  <rect x="6" y="24" width="4" height="6" fill="#663399"/>
  <rect x="38" y="24" width="4" height="6" fill="#663399"/>
  
  <!-- Hands -->
  <rect x="2" y="30" width="6" height="6" fill="#F4A460"/>
  <rect x="40" y="30" width="6" height="6" fill="#F4A460"/>
  
  <!-- Staff -->
  <rect x="0" y="8" width="4" height="32" fill="#8B4513"/>
  <rect x="-2" y="6" width="8" height="4" fill="#FFD700"/>
  <rect x="0" y="2" width="4" height="6" fill="#9370DB"/>
  <rect x="-1" y="4" width="2" height="2" fill="#FFF"/>
  <rect x="3" y="4" width="2" height="2" fill="#FFF"/>
  
  <!-- Head -->
  <rect x="16" y="10" width="16" height="12" fill="#F4A460"/>
  <rect x="18" y="12" width="12" height="8" fill="#FFDEAD"/>
  
  <!-- Hair -->
  <rect x="14" y="8" width="20" height="6" fill="#FFF"/>
  <rect x="12" y="10" width="4" height="8" fill="#FFF"/>
  <rect x="32" y="10" width="4" height="8" fill="#FFF"/>
  <rect x="14" y="6" width="8" height="4" fill="#FFF"/>
  <rect x="26" y="6" width="8" height="4" fill="#FFF"/>
  
  <!-- Hat -->
  <rect x="16" y="4" width="16" height="6" fill="#4B0082"/>
  <rect x="18" y="2" width="12" height="4" fill="#663399"/>
  <rect x="22" y="0" width="4" height="4" fill="#4B0082"/>
  
  <!-- Eyes -->
  <rect x="19" y="16" width="3" height="3" fill="#000"/>
  <rect x="26" y="16" width="3" height="3" fill="#000"/>
  
  <!-- Beard -->
  <rect x="20" y="20" width="8" height="4" fill="#DDD"/>
  <rect x="22" y="22" width="4" height="2" fill="#FFF"/>
