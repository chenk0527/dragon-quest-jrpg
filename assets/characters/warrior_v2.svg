<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Background -->
  <rect x="0" y="0" width="64" height="64" fill="transparent"/>
  
  <!-- Warrior Pixel Art - 64x64 -->
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="16" ry="4" fill="#000000" opacity="0.3"/>
  
  <!-- Legs - Brown Boots -->
  <rect x="20" y="44" width="10" height="14" fill="#4a3728"/>
  <rect x="34" y="44" width="10" height="14" fill="#4a3728"/>
  <rect x="18" y="48" width="4" height="10" fill="#3d2e20"/>
  <rect x="42" y="48" width="4" height="10" fill="#3d2e20"/>
  
  <!-- Legs armor highlights -->
  <rect x="22" y="48" width="6" height="4" fill="#5c4332"/>
  <rect x="36" y="48" width="6" height="4" fill="#5c4332"/>
  
  <!-- Body - Blue Tunic -->
  <rect x="18" y="28" width="28" height="20" fill="#2c5aa0"/>
  <rect x="16" y="30" width="4" height="16" fill="#1e4a8a"/>
  <rect x="44" y="30" width="4" height="16" fill="#1e4a8a"/>
  
  <!-- Belt -->
  <rect x="18" y="40" width="28" height="4" fill="#4a3728"/>
  <rect x="30" y="40" width="4" height="4" fill="#ffd700"/>
  
  <!-- Chest armor -->
  <rect x="22" y="32" width="20" height="8" fill="#5a7ab8"/>
  <rect x="30" y="34" width="4" height="4" fill="#ffd700"/>
  
  <!-- Shoulder pads -->
  <rect x="14" y="26" width="8" height="8" fill="#708090"/>
  <rect x="42" y="26" width="8" height="8" fill="#708090"/
  <rect x="14" y="26" width="4" height="4" fill="#9aa5b0"/>
  <rect x="46" y="26" width="4" height="4" fill="#9aa5b0"/>
  
  <!-- Arms -->
  <rect x="10" y="30" width="8" height="12" fill="#d4a574"/>
  <rect x="46" y="30" width="8" height="12" fill="#d4a574"/>
  
  <!-- Gloves -->
  <rect x="8" y="38" width="10" height="6" fill="#4a3728"/>
  <rect x="46" y="38" width="10" height="6" fill="#4a3728"/>
  
  <!-- Head/Face -->
  <rect x="24" y="12" width="16" height="16" fill="#d4a574"/>
  
  <!-- Hair - Brown -->
  <rect x="22" y="10" width="20" height="6" fill="#5c4033"/>
  <rect x="20" y="12" width="4" height="8" fill="#5c4033"/>
  <rect x="40" y="12" width="4" height="8" fill="#5c4033"/>
  <rect x="24" y="8" width="16" height="4" fill="#5c4033"/>
  
  <!-- Hair highlights -->
  <rect x="26" y="10" width="4" height="2" fill="#7a5a48"/>
  <rect x="34" y="10" width="4" height="2" fill="#7a5a48"/>
  
  <!-- Eyes -->
  <rect x="28" y="20" width="3" height="3" fill="#2c3e50"/>
  <rect x="33" y="20" width="3" height="3" fill="#2c3e50"/>
  <rect x="29" y="21" width="1" height="1" fill="#ffffff"/>
  <rect x="34" y="21" width="1" height="1" fill="#ffffff"/>
  
  <!-- Nose -->
  <rect x="31" y="24" width="2" height="2" fill="#c49365"/>
  
  <!-- Mouth -->
  <rect x="29" y="28" width="6" height="2" fill="#a67b5b"/>
  
  <!-- Helmet/Crown -->
  <rect x="22" y="6" width="20" height="4" fill="#708090"/>
  <rect x="30" y="4" width="4" height="4" fill="#ffd700"/>
  
  <!-- Sword (Right Hand) -->
  <rect x="52" y="20" width="4" height="24" fill="#c0c0c0"/>
  <rect x="50" y="42" width="8" height="4" fill="#4a3728"/>
  <rect x="52" y="38" width="4" height="4" fill="#ffd700"/>
  
  <!-- Sword blade shine -->
  <rect x="53" y="22" width="1" height="20" fill="#ffffff" opacity="0.6"/>
  
  <!-- Shield (Left Hand) -->
  <rect x="4" y="28" width="12" height="16" fill="#8b4513" rx="2"/>
  <rect x="6" y="30" width="8" height="12" fill="#a0522d"/>
  <rect x="9" y="34" width="2" height="4" fill="#ffd700"/>
  
  <!-- Cape flowing -->
  <rect x="16" y="28" width="4" height="24" fill="#8b0000"/>
  <rect x="44" y="28" width="4" height="24" fill="#8b0000"/>
  <rect x="18" y="48" width="28" height="4" fill="#6b0000"/>
</svg>
