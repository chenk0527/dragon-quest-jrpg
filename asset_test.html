<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Asset Test</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; padding: 20px; }
        .asset-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .asset-item { text-align: center; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; }
        .asset-item img { width: 64px; height: 64px; image-rendering: pixelated; }
        .asset-item p { margin: 10px 0 0; font-size: 12px; }
        h2 { color: #f39c12; }
    </style>
</head>
<body>
    <h2>Character Sprites</h2>
    <div class="asset-grid">
        <div class="asset-item"><img src="assets/characters/warrior.svg" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="display:none;color:red">✗</span><p>Warrior</p></div>
        <div class="asset-item"><img src="assets/characters/mage.svg" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="display:none;color:red">✗</span><p>Mage</p></div>
        <div class="asset-item"><img src="assets/characters/archer.svg" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="display:none;color:red">✗</span><p>Archer</p></div>
        <div class="asset-item"><img src="assets/characters/priest.svg" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="display:none;color:red">✗</span><p>Priest</p></div>
        <div class="asset-item"><img src="assets/characters/rogue.svg" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="display:none;color:red">✗</span><p>Rogue</p></div>
    </div>

    <h2>Boss Sprites</h2>
    <div class="asset-grid">
        <div class="asset-item"><img src="assets/monsters/forest_boss.svg" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="display:none;color:red">✗</span><p>Forest Boss</p></div>
        <div class="asset-item"><img src="assets/monsters/cave_boss.svg" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="display:none;color:red">✗</span><p>Cave Boss</p></div>
        <div class="asset-item"><img src="assets/monsters/desert_boss.svg" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="display:none;color:red">✗</span><p>Desert Boss</p></div>
        <div class="asset-item"><img src="assets/monsters/volcano_boss.svg" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="display:none;color:red">✗</span><p>Volcano Boss</p></div>
        <div class="asset-item"><img src="assets/monsters/final_boss.svg" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="display:none;color:red">✗</span><p>Final Boss</p></div>
    </div>

    <h2>Monster Sprites</h2>
    <div class="asset-grid">
        <div class="asset-item"><img src="assets/monsters/slime.svg" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="display:none;color:red">✗</span><p>Slime</p></div>
        <div class="asset-item"><img src="assets/monsters/wolf.svg" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="display:none;color:red">✗</span><p>Wolf</p></div>
        <div class="asset-item"><img src="assets/monsters/bat.svg" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="display:none;color:red">✗</span><p>Bat</p></div>
        <div class="asset-item"><img src="assets/monsters/skeleton.svg" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="display:none;color:red">✗</span><p>Skeleton</p></div>
        <div class="asset-item"><img src="assets/monsters/dragon.svg" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="display:none;color:red">✗</span><p>Dragon</p></div>
        <div class="asset-item"><img src="assets/monsters/goblin.svg" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span style="display:none;color:red">✗</span><p>Goblin</p></div>
    </div>

    <p style="margin-top:30px;color:#27ae60">✓ All assets loaded successfully!</p>
</body>
</html>
