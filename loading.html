<!-- Loading Screen -->
<div id="loadingScreen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s;">
    <div style="font-size:48px;margin-bottom:20px;">⚔️</div>
    <div style="font-size:24px;color:#f39c12;font-weight:bold;margin-bottom:30px;">勇者斗恶龙 JRPG</div>
    <div style="width:200px;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;">
        <div id="loadingBar" style="width:0%;height:100%;background:linear-gradient(90deg,#f39c12,#e74c3c);transition:width 0.3s;"></div>
    </div>
    <div id="loadingText" style="margin-top:15px;color:#95a5a6;font-size:14px;">加载资源中...</div>
</div>

<script>
// Loading screen management
window.showLoading = function(text) {
    const screen = document.getElementById('loadingScreen');
    const textEl = document.getElementById('loadingText');
    if (screen) screen.style.display = 'flex';
    if (textEl && text) textEl.textContent = text;
};

window.hideLoading = function() {
    const screen = document.getElementById('loadingScreen');
    if (screen) {
        screen.style.opacity = '0';
        setTimeout(() => {
            screen.style.display = 'none';
        }, 500);
    }
};

window.updateLoadingProgress = function(percent) {
    const bar = document.getElementById('loadingBar');
    if (bar) bar.style.width = percent + '%';
};

// Simulate loading
let loadProgress = 0;
const loadInterval = setInterval(() => {
    loadProgress += Math.random() * 15;
    if (loadProgress >= 100) {
        loadProgress = 100;
        clearInterval(loadInterval);
        setTimeout(hideLoading, 300);
    }
    updateLoadingProgress(loadProgress);
}, 200);
</script>
